<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BreachCheck - OSINT Breach Scanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        h1 {
            color: #4a5568;
            margin-bottom: 1rem;
            font-size: 2rem;
        }
        .subtitle {
            color: #718096;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        input[type="email"] {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }
        input[type="email"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .loading { display: none; margin: 1rem 0; }
        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .results { display: none; margin-top: 2rem; }
        .breach {
            background: #fef5e7;
            border: 1px solid #fed7aa;
            border-radius: 12px;
            padding: 1.5rem;
            margin: 1rem 0;
            text-align: left;
        }
        .breach h3 { color: #c05621; margin-bottom: 0.5rem; }
        .breach p { color: #744210; margin: 0.25rem 0; font-size: 0.95rem; }
        .safe { 
            background: #f0fff4;
            border: 1px solid #9ae6b4;
            border-radius: 12px;
            padding: 2rem;
            margin-top: 1rem;
        }
        .safe h3 { color: #38a169; }
        .error { 
            background: #fed7d7;
            border: 1px solid #fc8181;
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1rem;
            color: #c53030;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 2rem 0;
            font-size: 0.9rem;
            color: #718096;
        }
        .stat { text-align: center; }
        .stat strong { display: block; font-size: 1.5rem; color: #4a5568; }
        footer {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
            font-size: 0.85rem;
            color: #a0aec0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 BreachCheck</h1>
        <p class="subtitle">Check if your email has been compromised in data breaches</p>
        
        <input type="email" id="emailInput" placeholder="Enter your email address" required>
        <button onclick="checkBreaches()">Check Breaches</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Scanning breach databases...</p>
        </div>
        
        <div class="results" id="results"></div>
        
        <div class="stats" id="stats" style="display: none;">
            <div class="stat">
                <strong id="totalBreaches">0</strong>
                Total breaches
            </div>
            <div class="stat">
                <strong id="yourBreaches">0</strong>
                Your breaches
            </div>
        </div>
        
        <footer>
            Powered by <a href="https://haveibeenpwned.com/API/v3" target="_blank">HIBP API</a> | 
            For educational/OSINT use only
        </footer>
    </div>

    <script>
        async function checkBreaches() {
            const email = document.getElementById('emailInput').value.trim();
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const stats = document.getElementById('stats');
            
            if (!email || !/\S+@\S+\.\S+/.test(email)) {
                showError('Please enter a valid email address');
                return;
            }
            
            // Show loading
            document.querySelector('button').disabled = true;
            loading.style.display = 'block';
            results.style.display = 'none';
            stats.style.display = 'none';
            
            try {
                // HIBP API doesn't require auth for basic breach search (email only)
                const response = await fetch(`https://haveibeenpwned.com/api/v3/breachedaccount/${encodeURIComponent(email)}?truncateResponse=true`, {
                    headers: { 'User-Agent': 'BreachCheck-OSINT' }
                });
                
                if (response.status === 404) {
                    showSafe();
                } else if (response.ok) {
                    const breaches = await response.json();
                    showBreaches(breaches);
                } else if (response.status === 429) {
                    showError('Rate limited. Please wait a moment and try again.');
                } else {
                    showError('Error checking breaches. Try again later.');
                }
            } catch (error) {
                showError('Network error. Please check your connection.');
            } finally {
                loading.style.display = 'none';
                document.querySelector('button').disabled = false;
            }
        }
        
        function showBreaches(breaches) {
            const results = document.getElementById('results');
            results.innerHTML = '';
            
            breaches.forEach(breach => {
                const div = document.createElement('div');
                div.className = 'breach';
                div.innerHTML = `
                    <h3>${breach.Name}</h3>
                    <p><strong>Date:</strong> ${new Date(breach.BreachDate).toLocaleDateString()}</p>
                    <p><strong>Domain:</strong> ${breach.Domain}</p>
                    <p><strong>Compromised data:</strong> ${breach.DataClasses.join(', ')}</p>
                `;
                results.appendChild(div);
            });
            
            document.getElementById('totalBreaches').textContent = '4,500+';
            document.getElementById('yourBreaches').textContent = breaches.length;
            document.getElementById('stats').style.display = 'flex';
            results.style.display = 'block';
        }
        
        function showSafe() {
            const results = document.getElementById('results');
            results.innerHTML = `
                <div class="safe">
                    <h3>✅ Good news!</h3>
                    <p>No breaches found for this email address.</p>
                    <p style="font-size: 0.9rem; color: #68d391; margin-top: 1rem;">
                        This doesn't guarantee security - stay vigilant!
                    </p>
                </div>
            `;
            document.getElementById('totalBreaches').textContent = '4,500+';
            document.getElementById('yourBreaches').textContent = '0';
            document.getElementById('stats').style.display = 'flex';
            results.style.display = 'block';
        }
        
        function showError(message) {
            const results = document.getElementById('results');
            results.innerHTML = `<div class="error">${message}</div>`;
            results.style.display = 'block';
        }
        
        // Enter key support
        document.getElementById('emailInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkBreaches();
        });
    </script>
</body>
</html>
