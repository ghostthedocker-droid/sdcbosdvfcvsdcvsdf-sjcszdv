<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canva CV - Drag & Drop Resume Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.js" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #1e40af 100%);
            min-height: 100vh;
            padding: 20px;
            color: #1f2937;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 30px;
            margin-bottom: 30px;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            -webkit-background-clip: text;
            background-clip: text;
            margin-bottom: 12px;
        }

        /* Main Layout */
        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr 420px;
            gap: 24px;
            align-items: start;
        }

        /* Sidebar - Block Library */
        .sidebar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 24px;
            height: fit-content;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .sidebar-section {
            margin-bottom: 32px;
        }

        .sidebar-section h3 {
            color: #1f2937;
            margin-bottom: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .block-item {
            background: white;
            border: 2px dashed #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            cursor: grab;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: 500;
            color: #6b7280;
        }

        .block-item:hover {
            border-color: #3b82f6;
            background: #f8fafc;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.15);
        }

        .block-item:active {
            cursor: grabbing;
        }

        /* Canvas Area */
        .canvas-area {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
        }

        .canvas-title {
            text-align: center;
            color: #1f2937;
            margin-bottom: 32px;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .cv-canvas {
            background: white;
            width: 794px;
            height: 1123px;
            margin: 0 auto;
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            position: relative;
            font-family: 'Poppins', sans-serif;
            cursor: default;
        }

        .drag-placeholder {
            border: 3px dashed #3b82f6;
            background: rgba(59, 130, 246, 0.05);
            border-radius: 8px;
            height: 80px;
            margin: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3b82f6;
            font-weight: 500;
        }

        /* CV Blocks */
        .cv-block {
            padding: 24px 40px;
            border-bottom: 1px solid #f3f4f6;
            transition: all 0.3s ease;
            position: relative;
        }

        .cv-block:hover {
            background: #f8fafc;
        }

        .block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .block-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #111827;
        }

        .block-controls {
            display: flex;
            gap: 8px;
        }

        .block-btn {
            background: none;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 12px;
            color: #6b7280;
            transition: all 0.2s ease;
        }

        .block-btn:hover {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        .block-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #f3f4f6;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .block-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* Preview Panel */
        .preview-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 24px;
            height: fit-content;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .download-section {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 32px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 24px;
        }

        .download-btn {
            background: white;
            color: #059669;
            border: none;
            padding: 18px 40px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 0 auto;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.3);
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.4);
        }

        .download-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .cv-preview {
            width: 100%;
            height: 600px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        /* Responsive */
        @media (max-width: 1400px) {
            .main-grid {
                grid-template-columns: 300px 1fr;
            }
            .preview-panel {
                grid-column: 1 / -1;
            }
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .cv-canvas {
                width: 100%;
                max-width: 400px;
                height: 562px;
            }
        }

        /* Drag & Drop Visual Feedback */
        .drag-over {
            border: 3px dashed #10b981 !important;
            background: rgba(16, 185, 129, 0.08) !important;
        }

        .loading {
            pointer-events: none;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-file-signature"></i> Canva CV</h1>
            <p>Drag & drop blocks to build your perfect resume</p>
        </div>

        <div class="main-grid">
            <!-- Block Library -->
            <div class="sidebar">
                <div class="sidebar-section">
                    <h3><i class="fas fa-cube"></i> Add Blocks</h3>
                    <div class="block-item" draggable="true" data-block="header">
                        <i class="fas fa-user-circle" style="font-size: 24px; margin-bottom: 8px; display: block; color: #6b7280;"></i>
                        Personal Header
                    </div>
                    <div class="block-item" draggable="true" data-block="summary">
                        <i class="fas fa-quote-left" style="font-size: 24px; margin-bottom: 8px; display: block; color: #6b7280;"></i>
                        Summary
                    </div>
                    <div class="block-item" draggable="true" data-block="experience">
                        <i class="fas fa-briefcase" style="font-size: 24px; margin-bottom: 8px; display: block; color: #6b7280;"></i>
                        Experience
                    </div>
                    <div class="block-item" draggable="true" data-block="education">
                        <i class="fas fa-graduation-cap" style="font-size: 24px; margin-bottom: 8px; display: block; color: #6b7280;"></i>
                        Education
                    </div>
                    <div class="block-item" draggable="true" data-block="skills">
                        <i class="fas fa-star" style="font-size: 24px; margin-bottom: 8px; display: block; color: #6b7280;"></i>
                        Skills
                    </div>
                </div>
            </div>

            <!-- Canvas -->
            <div class="canvas-area">
                <h2 class="canvas-title">Drag blocks here to build your CV ✨</h2>
                <div id="cvCanvas" class="cv-canvas" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragenter="handleDragEnter(event)">
                    <div class="drag-placeholder">
                        <i class="fas fa-mouse-pointer" style="margin-right: 12px;"></i>
                        Drag blocks from left sidebar
                    </div>
                </div>
            </div>

            <!-- Preview & Download -->
            <div class="preview-panel">
                <div class="download-section">
                    <button id="downloadBtn" class="download-btn" disabled>
                        <i class="fas fa-download"></i>
                        Download PDF
                        <span id="downloadStatus"></span>
                    </button>
                    <p style="margin-top: 16px; opacity: 0.9; font-size: 14px;">Add your header first to enable download</p>
                </div>
                <div style="text-align: center; color: #6b7280; font-size: 14px;">
                    📱 Live Preview (Scaled)
                </div>
                <div id="previewCanvas" class="cv-preview"></div>
            </div>
        </div>
    </div>

    <script>
        class CanvaCV {
            constructor() {
                this.blocks = [];
                this.init();
            }

            init() {
                this.bindEvents();
                this.updatePreview();
            }

            bindEvents() {
                // Drag & Drop
                document.addEventListener('dragstart', this.handleDragStart.bind(this));
                document.addEventListener('dragend', this.handleDragEnd.bind(this));

                // Download
                document.getElementById('downloadBtn').addEventListener('click', () => this.downloadPDF());
            }

            handleDragStart(e) {
                if (e.target.classList.contains('block-item')) {
                    e.dataTransfer.setData('text/plain', e.target.dataset.block);
                    e.target.style.opacity = '0.5';
                }
            }

            handleDragEnd(e) {
                if (e.target.classList.contains('block-item')) {
                    e.target.style.opacity = '1';
                }
            }

            handleDragOver(e) {
                e.preventDefault();
                e.currentTarget.classList.add('drag-over');
            }

            handleDragEnter(e) {
                e.preventDefault();
            }

            handleDragLeave(e) {
                e.currentTarget.classList.remove('drag-over');
            }

            handleDrop(e) {
                e.preventDefault();
                e.currentTarget.classList.remove('drag-over');
                
                const blockType = e.dataTransfer.getData('text/plain');
                const blockHtml = this.createBlockHTML(blockType);
                e.currentTarget.insertAdjacentHTML('beforeend', blockHtml);
                
                this.bindBlockEvents();
                this.updatePreview();
                this.updateDownloadBtn();
            }

            createBlockHTML(type) {
                const templates = {
                    header: `
                        <div class="cv-block" data-type="header">
                            <div class="block-header">
                                <div class="block-title">Personal Header</div>
                                <div class="block-controls">
                                    <button class="block-btn edit-btn" data-field="name"><i class="fas fa-edit"></i></button>
                                    <button class="block-btn delete-btn" data-action="delete"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                            <input class="block-input" data-field="name" placeholder="Full Name" />
                            <input class="block-input" data-field="title" placeholder="Professional Title" />
                            <div style="display: flex; gap: 20px; flex-wrap: wrap; font-size: 14px; color: #6b7280;">
                                <input class="block-input" data-field="phone" placeholder="Phone" style="width: 140px;" />
                                <input class="block-input" data-field="email" placeholder="Email" style="width: 160px;" />
                                <input class="block-input" data-field="location" placeholder="Location" style="width: 120px;" />
                            </div>
                        </div>
                    `,
                    summary: `
                        <div class="cv-block" data-type="summary">
                            <div class="block-header">
                                <div class="block-title">Professional Summary</div>
                                <div class="block-controls">
                                    <button class="block-btn edit-btn" data-field="content"><i class="fas fa-edit"></i></button>
                                    <button class="block-btn delete-btn" data-action="delete"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                            <textarea class="block-input" data-field="content" placeholder="Write your professional summary..."></textarea>
                        </div>
                    `,
                    experience: `
                        <div class="cv-block" data-type="experience">
                            <div class="block-header">
                                <div class="block-title">Work Experience</div>
                                <div class="block-controls">
                                    <button class="block-btn edit-btn" data-field="title"><i class="fas fa-edit"></i></button>
                                    <button class="block-btn delete-btn" data-action="delete"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                            <input class="block-input" data-field="title" placeholder="Job Title - Company Name" />
                            <input class="block-input" data-field="dates" placeholder="Dates (2020 - Present)" />
                            <textarea class="block-input" data-field="desc" placeholder="Description & achievements..."></textarea>
                        </div>
                    `,
                    education: `
                        <div class="cv-block" data-type="education">
                            <div class="block-header">
                                <div class="block-title">Education</div>
                                <div class="block-controls">
                                    <button class="block-btn edit-btn" data-field="degree"><i class="fas fa-edit"></i></button>
                                    <button class="block-btn delete-btn" data-action="delete"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                            <input class="block-input" data-field="degree" placeholder="Degree - University Name" />
                            <input class="block-input" data-field="dates" placeholder="Dates (2016 - 2020)" />
                        </div>
                    `,
                    skills: `
                        <div class="cv-block" data-type="skills">
                            <div class="block-header">
                                <div class="block-title">Skills</div>
                                <div class="block-controls">
                                    <button class="block-btn edit-btn" data-field="skills"><i class="fas fa-edit"></i></button>
                                    <button class="block-btn delete-btn" data-action="delete"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                            <input class="block-input" data-field="skills" placeholder="JavaScript, Python, React, Node.js..." />
                        </div>
                    `
                };
                return templates[type] || '';
            }

            bindBlockEvents() {
                // Edit buttons
                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const block = btn.closest('.cv-block');
                        const field = btn.dataset.field;
                        const input = block.querySelector(`[data-field="${field}"]`);
                        input.focus();
                    });
                });

                // Delete buttons
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.target.closest('.cv-block').remove();
                        this.updatePreview();
                        this.updateDownloadBtn();
                    });
                });

                // Input events
                document.querySelectorAll('.block-input').forEach(input => {
                    input.addEventListener('input', () => {
                        this.updatePreview();
                        this.updateDownloadBtn();
                    });
                });
            }

            updatePreview() {
                const canvas = document.getElementById('cvCanvas');
                const preview = document.getElementById('previewCanvas');
                
                // Copy canvas content to preview (scaled)
                preview.innerHTML = canvas.innerHTML;
                
                // Scale preview
                const blocks = preview.querySelectorAll('.cv-block');
                blocks.forEach(block => {
                    block.style.fontSize = '0.75em';
                    block.style.padding = '16px 24px';
                    block.querySelectorAll('.block-input').forEach(input => {
                        input.style.display = 'none';
                    });
                });
                
                preview.querySelectorAll('.block-header').forEach(header => {
                    header.remove();
                });
            }

            updateDownloadBtn() {
                const canvas = document.getElementById('cvCanvas');
                const hasHeader = canvas.querySelector('[data-type="header"]');
                const btn = document.getElementById('downloadBtn');
                const status = document.getElementById('downloadStatus');
                
                if (hasHeader) {
                    btn.disabled = false;
                    status.textContent = '';
                    document.querySelector('.download-section p').textContent = 'Ready to download!';
                } else {
                    btn.disabled = true;
                    status.textContent = '';
                    document.querySelector('.download-section p').textContent = 'Add your header first to enable download';
                }
            }

            async downloadPDF() {
                const btn = document.getElementById('downloadBtn');
                const canvas = document.getElementById('cvCanvas');
                
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating PDF...';
                document.body.classList.add('loading');

                try {
                    // Create clean version for PDF
                    const cleanCanvas = canvas.cloneNode(true);
                    cleanCanvas.style.cssText = `
                        width: 794px !important;
                        height: 1123px !important;
                        margin: 0 !important;
                        padding: 0 !important;
                        font-family: 'Poppins', sans-serif !important;
                        background: white !important;
                        border-radius: 0 !important;
                        box-shadow: none !important;
                    `;

                    // Hide inputs and show formatted content
                    cleanCanvas.querySelectorAll('.block-input').forEach(input => {
                        const field = input.dataset.field;
                        let content = input.value || input.placeholder;
                        
                        // Special formatting
                        if (field === 'skills') {
                            content = content.split(',').map(s => s.trim()).filter(s => s).join(' • ');
                        }
                        
                        const span = document.createElement('div');
                        span.textContent = content;
                        span.style.cssText = `
                            font-size: 15px;
                            line-height: 1.6;
                            color: #374151;
                            margin-bottom: 12px;
                            padding: 12px 0;
                            border-bottom: 1px solid #f3f4f6;
                        `;
                        input.parentNode.appendChild(span);
                        input.style.display = 'none';
                    });

                    cleanCanvas.querySelectorAll('.block-header').forEach(header => {
                        const title = header.querySelector('.block-title').textContent;
                        const newTitle = document.createElement('h2');
                        newTitle.textContent = title;
                        newTitle.style.cssText = `
                            font-size: 1.4rem;
                            font-weight: 700;
                            color: #111827;
                            margin: 32px 0 20px 0;
                            padding-bottom: 12px;
                            border-bottom: 3px solid #3b82f6;
                        `;
                        header.parentNode.insertBefore(newTitle, header);
                        header.remove();
                    });

                    cleanCanvas.querySelectorAll('.block-controls').forEach(controls => {
                        controls.remove();
                    });

                    document.body.appendChild(cleanCanvas);

                    const opt = {
                        margin: 0.5,
                        filename: 'My_Resume.pdf',
                        image: { type: 'jpeg', quality: 0.98 },
                        html2canvas: { 
                            scale: 2,
                            useCORS: true,
                            letterRendering: true,
                            width: 794,
                            height: 1123
                        },
                        jsPDF: { 
                            unit: 'in', 
                            format: 'a4', 
                            orientation: 'portrait' 
                        },
                        pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
                    };

                    await html2pdf().set(opt).from(cleanCanvas).save();
                    
                } catch (error) {
                    console.error('PDF Error:', error);
                    alert('PDF generation failed. Please try again.');
                } finally {
                    document.body.classList.remove('loading');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-download"></i> Download PDF';
                    document.querySelector('.download-section p').textContent = 'PDF Ready! Perfect A4 format.';
                }
            }
        }

        // Global functions for drag/drop
        function handleDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('drag-over');
        }

        function handleDragEnter(e) {
            e.preventDefault();
        }

        function handleDragLeave(e) {
            if (!e.currentTarget.contains(e.relatedTarget)) {
                e.currentTarget.classList.remove('drag-over');
            }
        }

        function handleDrop(e) {
            window.cvApp.handleDrop(e);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            window.cvApp = new CanvaCV();
        });
    </script>
</body>
</html>
