<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Maker - Create Your Resume</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-file-alt"></i> CV Maker</h1>
            <p>Create professional resumes in seconds</p>
        </header>

        <div class="main-content">
            <div class="editor">
                <h2><i class="fas fa-edit"></i> Edit Your CV</h2>
                <form id="cvForm">
                    <!-- Personal Info -->
                    <div class="section">
                        <h3>Personal Information</h3>
                        <div class="form-row">
                            <input type="text" id="fullName" placeholder="Full Name" required>
                            <input type="tel" id="phone" placeholder="Phone">
                        </div>
                        <div class="form-row">
                            <input type="email" id="email" placeholder="Email">
                            <input type="text" id="location" placeholder="Location">
                        </div>
                        <input type="text" id="linkedin" placeholder="LinkedIn URL">
                        <input type="text" id="portfolio" placeholder="Portfolio URL">
                    </div>

                    <!-- Summary -->
                    <div class="section">
                        <h3>Professional Summary</h3>
                        <textarea id="summary" rows="4" placeholder="Tell us about your professional background..."></textarea>
                    </div>

                    <!-- Experience -->
                    <div class="section">
                        <h3>Work Experience</h3>
                        <div id="experienceItems">
                            <div class="experience-item">
                                <div class="form-row">
                                    <input type="text" class="jobTitle" placeholder="Job Title">
                                    <input type="text" class="company" placeholder="Company">
                                </div>
                                <div class="form-row">
                                    <input type="text" class="jobDates" placeholder="Dates (e.g., 2020 - Present)">
                                    <textarea class="jobDesc" rows="2" placeholder="Description"></textarea>
                                </div>
                            </div>
                        </div>
                        <button type="button" id="addExperience" class="add-btn">
                            <i class="fas fa-plus"></i> Add Experience
                        </button>
                    </div>

                    <!-- Education -->
                    <div class="section">
                        <h3>Education</h3>
                        <div id="educationItems">
                            <div class="education-item">
                                <div class="form-row">
                                    <input type="text" class="degree" placeholder="Degree">
                                    <input type="text" class="school" placeholder="School">
                                </div>
                                <input type="text" class="eduDates" placeholder="Dates (e.g., 2018 - 2022)">
                            </div>
                        </div>
                        <button type="button" id="addEducation" class="add-btn">
                            <i class="fas fa-plus"></i> Add Education
                        </button>
                    </div>

                    <!-- Skills -->
                    <div class="section">
                        <h3>Skills</h3>
                        <div id="skillsInput">
                            <input type="text" id="skillInput" placeholder="Add a skill (e.g., JavaScript, Python)">
                            <button type="button" id="addSkill" class="add-btn small">Add</button>
                        </div>
                        <div id="skillsList"></div>
                    </div>
                </form>
            </div>

            <div class="preview">
                <div class="preview-header">
                    <h2><i class="fas fa-eye"></i> Live Preview</h2>
                    <div class="preview-controls">
                        <button id="downloadPDF" class="btn-primary">
                            <i class="fas fa-download"></i> Download PDF
                        </button>
                        <button id="copyHTML" class="btn-secondary">
                            <i class="fas fa-copy"></i> Copy HTML
                        </button>
                    </div>
                </div>
                <div id="cvPreview" class="cv-preview">
                    <!-- CV will be rendered here -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
