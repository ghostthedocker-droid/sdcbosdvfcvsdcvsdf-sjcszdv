<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Live TV - Watch Worldwide Channels</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>">
</head>
<body>
    <header>
        <h1>📺 Free Live TV</h1>
        <p>Watch live television from around the world - No subscriptions required</p>
    </header>

    <div class="container">
        <div class="filters">
            <select id="countryFilter">
                <option value="">All Countries</option>
                <option value="US">United States</option>
                <option value="UK">United Kingdom</option>
                <option value="CA">Canada</option>
                <option value="AU">Australia</option>
                <option value="IN">India</option>
                <option value="FR">France</option>
                <option value="DE">Germany</option>
            </select>
            <select id="categoryFilter">
                <option value="">All Categories</option>
                <option value="news">News</option>
                <option value="sports">Sports</option>
                <option value="movies">Movies</option>
                <option value="music">Music</option>
                <option value="kids">Kids</option>
            </select>
            <input type="text" id="search" placeholder="Search channels...">
        </div>

        <div class="channel-grid" id="channelGrid">
            <!-- Channels populated by JS -->
        </div>
    </div>

    <div class="player-modal" id="playerModal">
        <div class="player-container">
            <span class="close">&times;</span>
            <iframe id="videoPlayer" allowfullscreen allow="autoplay; fullscreen *; encrypted-media" sandbox="allow-scripts allow-same-origin allow-presentation"></iframe>
            <div class="channel-info">
                <h3 id="channelTitle"></h3>
                <p id="channelDesc"></p>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
