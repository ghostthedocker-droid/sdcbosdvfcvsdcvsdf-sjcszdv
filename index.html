<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Maker - Free Resume Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            padding: 20px; 
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 40px; }
        header h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; }
        header p { font-size: 1.2rem; opacity: 0.9; }
        .main-content { display: grid; grid-template-columns: 1fr 450px; gap: 30px; align-items: start; }
        .editor, .preview { 
            background: white; padding: 30px; border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); height: fit-content; 
        }
        .editor h2, .preview h2 { color: #333; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .section { margin-bottom: 30px; padding: 20px; background: #f8f9ff; border-radius: 12px; border-left: 4px solid #667eea; }
        .section h3 { color: #333; margin-bottom: 20px; font-size: 1.1rem; font-weight: 600; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        input, textarea { 
            padding: 12px 15px; border: 2px solid #e1e5e9; border-radius: 8px; 
            font-size: 14px; transition: all 0.3s ease; font-family: inherit; 
        }
        input:focus, textarea:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        textarea { width: 100%; resize: vertical; }
        .add-btn { 
            background: #667eea; color: white; border: none; padding: 10px 20px; 
            border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; 
            display: inline-flex; align-items: center; gap: 8px; transition: all 0.3s ease; 
        }
        .add-btn:hover { background: #5a67d8; transform: translateY(-1px); }
        .add-btn.small { padding: 8px 16px; font-size: 13px; }
        .experience-item, .education-item { 
            background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; 
            border: 2px dashed #e1e5e9; transition: all 0.3s ease; 
        }
        .experience-item:hover, .education-item:hover { border-color: #667eea; }
        .remove-btn { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-top: 10px; }
        .skill-tag { 
            display: inline-flex; align-items: center; background: #667eea; color: white; 
            padding: 6px 12px; border-radius: 20px; margin: 5px 8px 5px 0; font-size: 14px; gap: 6px; 
        }
        .skill-remove { background: none; border: none; color: white; font-size: 16px; cursor: pointer; padding: 0; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }
        #skillsInput { display: flex; gap: 10px; margin-bottom: 15px; }
        .cv-preview { 
            background: white; min-height: 800px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            padding: 40px; font-family: 'Inter', sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; 
        }
        .cv-preview h1 { font-size: 2.5rem; font-weight: 700; color: #1a1a1a; margin-bottom: 10px; }
        .cv-preview .contact-info { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .cv-preview .contact-item { color: #666; font-size: 15px; }
        .cv-preview .contact-item a { color: #667eea; text-decoration: none; }
        .cv-preview h2 { font-size: 1.4rem; color: #1a1a1a; border-bottom: 2px solid #667eea; padding-bottom: 8px; margin: 30px 0 20px 0; }
        .cv-preview h3 { font-size: 1.1rem; color: #333; margin: 20px 0 10px 0; }
        .cv-preview h4 { font-size: 1rem; color: #555; margin-bottom: 5px; }
        .cv-preview .job-dates { color: #667eea; font-weight: 600; }
        .cv-preview ul { margin: 10px 0 20px 20px; }
        .cv-preview li { margin-bottom: 8px; }
        .skills-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .cv-preview .skill-tag { background: #f0f4ff; color: #667eea; padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: 500; }
        .preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .preview-controls { display: flex; gap: 10px; }
        .btn-primary, .btn-secondary { 
            padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; 
            font-weight: 500; display: flex; align-items: center; gap: 8px; font-size: 14px; 
            transition: all 0.3s ease; 
        }
        .btn-primary { background: #10b981; color: white; }
        .btn-primary:hover { background: #059669; }
        .btn-primary:disabled { background: #6b7280; cursor: not-allowed; }
        .btn-secondary { background: #6b7280; color: white; }
        .btn-secondary:hover { background: #4b5563; }
        @media (max-width: 1024px) { .main-content { grid-template-columns: 1fr; gap: 20px; } .preview { order: -1; } }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } .cv-preview { padding: 20px; } }
        .loading { opacity: 0.7; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-file-alt"></i> CV Maker</h1>
            <p>Create & Download Professional Resumes Instantly</p>
        </header>

        <div class="main-content">
            <div class="editor">
                <h2><i class="fas fa-edit"></i> Edit Your CV</h2>
                <form id="cvForm">
                    <div class="section">
                        <h3>Personal Information</h3>
                        <div class="form-row">
                            <input type="text" id="fullName" placeholder="Full Name *" required>
                            <input type="tel" id="phone" placeholder="Phone">
                        </div>
                        <div class="form-row">
                            <input type="email" id="email" placeholder="Email">
                            <input type="text" id="location" placeholder="City, Country">
                        </div>
                        <div class="form-row">
                            <input type="url" id="linkedin" placeholder="LinkedIn URL">
                            <input type="url" id="portfolio" placeholder="Portfolio URL">
                        </div>
                    </div>

                    <div class="section">
                        <h3>Professional Summary</h3>
                        <textarea id="summary" rows="4" placeholder="Write a brief professional summary..."></textarea>
                    </div>

                    <div class="section">
                        <h3>Work Experience</h3>
                        <div id="experienceItems">
                            <div class="experience-item">
                                <div class="form-row">
                                    <input type="text" class="jobTitle" placeholder="Job Title">
                                    <input type="text" class="company" placeholder="Company">
                                </div>
                                <div class="form-row">
                                    <input type="text" class="jobDates" placeholder="Dates (Jan 2020 - Present)">
                                    <textarea class="jobDesc" rows="2" placeholder="Key responsibilities & achievements..."></textarea>
                                </div>
                                <button type="button" class="remove-btn">Remove</button>
                            </div>
                        </div>
                        <button type="button" id="addExperience" class="add-btn"><i class="fas fa-plus"></i> Add Experience</button>
                    </div>

                    <div class="section">
                        <h3>Education</h3>
                        <div id="educationItems">
                            <div class="education-item">
                                <div class="form-row">
                                    <input type="text" class="degree" placeholder="Degree / Major">
                                    <input type="text" class="school" placeholder="University / School">
                                </div>
                                <input type="text" class="eduDates" placeholder="Dates (2018 - 2022)">
                                <button type="button" class="remove-btn">Remove</button>
                            </div>
                        </div>
                        <button type="button" id="addEducation" class="add-btn"><i class="fas fa-plus"></i> Add Education</button>
                    </div>

                    <div class="section">
                        <h3>Skills</h3>
                        <div id="skillsInput">
                            <input type="text" id="skillInput" placeholder="Type skill and press Enter">
                            <button type="button" id="addSkill" class="add-btn small">Add</button>
                        </div>
                        <div id="skillsList"></div>
                    </div>
                </form>
            </div>

            <div class="preview">
                <div class="preview-header">
                    <h2><i class="fas fa-eye"></i> Live Preview</h2>
                    <div class="preview-controls">
                        <button id="downloadPDF" class="btn-primary">
                            <i class="fas fa-download"></i> Download PDF
                        </button>
                        <button id="copyHTML" class="btn-secondary">
                            <i class="fas fa-copy"></i> Copy HTML
                        </button>
                    </div>
                </div>
                <div id="cvPreview" class="cv-preview">
                    <div style="text-align:center;padding:100px 0;color:#999;">
                        <i class="fas fa-magic" style="font-size:4rem;margin-bottom:20px;opacity:0.5;"></i>
                        <h3>Fill in your details to see the magic ✨</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class CVMaker {
            constructor() {
                this.skills = [];
                this.init();
            }

            init() {
                this.bindEvents();
                this.updatePreview();
                this.loadFromLocalStorage();
            }

            bindEvents() {
                document.querySelectorAll('#cvForm input, #cvForm textarea').forEach(input => {
                    input.addEventListener('input', () => this.updatePreview());
                });

                document.getElementById('addExperience').addEventListener('click', () => this.addExperienceItem());
                document.getElementById('addEducation').addEventListener('click', () => this.addEducationItem());
                document.getElementById('addSkill').addEventListener('click', () => this.addSkill());
                document.getElementById('skillInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.addSkill();
                });

                document.getElementById('downloadPDF').addEventListener('click', () => this.downloadPDF());
                document.getElementById('copyHTML').addEventListener('click', () => this.copyHTML());

                document.addEventListener('click', (e) => {
                    if (e.target.classList.contains('remove-btn')) {
                        e.target.closest('.experience-item, .education-item').remove();
                        this.updatePreview();
                    }
                    if (e.target.classList.contains('skill-remove')) {
                        this.skills.splice(parseInt(e.target.dataset.index), 1);
                        this.renderSkills();
                        this.updatePreview();
                    }
                });

                document.addEventListener('input', (e) => {
                    if (e.target.closest('.experience-item, .education-item')) this.updatePreview();
                });
            }

            addExperienceItem() {
                const container = document.getElementById('experienceItems');
                const item = document.createElement('div');
                item.className = 'experience-item';
                item.innerHTML = `
                    <div class="form-row">
                        <input type="text" class="jobTitle" placeholder="Job Title">
                        <input type="text" class="company" placeholder="Company">
                    </div>
                    <div class="form-row">
                        <input type="text" class="jobDates" placeholder="Dates (Jan 2020 - Present)">
                        <textarea class="jobDesc" rows="2" placeholder="Key responsibilities & achievements..."></textarea>
                    </div>
                    <button type="button" class="remove-btn">Remove</button>
                `;
                item.querySelectorAll('input, textarea').forEach(input => {
                    input.addEventListener('input', () => this.updatePreview());
                });
                container.appendChild(item);
                this.updatePreview();
            }

            addEducationItem() {
                const container = document.getElementById('educationItems');
                const item = document.createElement('div');
                item.className = 'education-item';
                item.innerHTML = `
                    <div class="form-row">
                        <input type="text" class="degree" placeholder="Degree / Major">
                        <input type="text" class="school" placeholder="University / School">
                    </div>
                    <input type="text" class="eduDates" placeholder="Dates (2018 - 2022)">
                    <button type="button" class="remove-btn">Remove</button>
                `;
                item.querySelectorAll('input').forEach(input => {
                    input.addEventListener('input', () => this.updatePreview());
                });
                container.appendChild(item);
                this.updatePreview();
            }

            addSkill() {
                const input = document.getElementById('skillInput');
                const skill = input.value.trim();
                if (skill && !this.skills.includes(skill)) {
                    this.skills.push(skill);
                    input.value = '';
                    this.renderSkills();
                    this.updatePreview();
                }
            }

            renderSkills() {
                const container = document.getElementById('skillsList');
                container.innerHTML = '';
                this.skills.forEach((skill, index) => {
                    const tag = document.createElement('div');
                    tag.className = 'skill-tag';
                    tag.innerHTML = `${skill}<button class="skill-remove" data-index="${index}">&times;</button>`;
                    container.appendChild(tag);
                });
            }

            getFormData() {
                return {
                    fullName: document.getElementById('fullName').value,
                    phone: document.getElementById('phone').value,
                    email: document.getElementById('email').value,
                    location: document.getElementById('location').value,
                    linkedin: document.getElementById('linkedin').value,
                    portfolio: document.getElementById('portfolio').value,
                    summary: document.getElementById('summary').value,
                    experience: Array.from(document.querySelectorAll('.experience-item')).map(item => ({
                        jobTitle: item.querySelector('.jobTitle').value,
                        company: item.querySelector('.company').value,
                        jobDates: item.querySelector('.jobDates').value,
                        jobDesc: item.querySelector('.jobDesc').value
                    })).filter(exp => exp.jobTitle || exp.company),
                    education: Array.from(document.querySelectorAll('.education-item')).map(item => ({
                        degree: item.querySelector('.degree').value,
                        school: item.querySelector('.school').value,
                        eduDates: item.querySelector('.eduDates').value
                    })).filter(edu => edu.degree || edu.school),
                    skills: this.skills
                };
            }

            updatePreview() {
                const preview = document.getElementById('cvPreview');
                const formData = this.getFormData();
                
                if (!formData.fullName) {
                    preview.innerHTML = '<div style="text-align:center;padding:100px 0;color:#999;"><i class="fas fa-magic" style="font-size:4rem;margin-bottom:20px;opacity:0.5;"></i><h3>Enter your name to start ✨</h3></div>';
                    return;
                }
                
                preview.innerHTML = `
                    <div style="text-align:center;margin-bottom:40px;">
                        <h1>${formData.fullName}</h1>
                        <div style="display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-top:15px;">
                            ${formData.phone ? `<span style="color:#666;font-size:15px;"><i class="fas fa-phone" style="margin-right:8px;color:#667eea;"></i>${formData.phone}</span>` : ''}
                            ${formData.email ? `<span style="color:#666;font-size:15px;"><i class="fas fa-envelope" style="margin-right:8px;color:#667eea;"></i>${formData.email}</span>` : ''}
                            ${formData.location ? `<span style="color:#666;font-size:15px;"><i class="fas fa-map-marker-alt" style="margin-right:8px;color:#667eea;"></i>${formData.location}</span>` : ''}
                            ${formData.linkedin ? `<a href="${formData.linkedin}" target="_blank" style="color:#667eea;font-size:15px;text-decoration:none;"><i class="fab fa-linkedin" style="margin-right:8px;"></i>LinkedIn</a>` : ''}
                            ${formData.portfolio ? `<a href="${formData.portfolio}" target="_blank" style="color:#667eea;font-size:15px;text-decoration:none;"><i class="fas fa-globe" style="margin-right:8px;"></i>Portfolio</a>` : ''}
                        </div>
                    </div>
                    ${formData.summary ? `<div style="background:#f8f9ff;padding:25px;border-left:4px solid #667eea;margin:30px 0;"><h2 style="font-size:1.3em;color:#1a1a1a;margin:0 0 15px 0;">Summary</h2><p style="margin:0;font-size:15px;">${formData.summary.replace(/\n/g, '<br>')}</p></div>` : ''}
                    ${formData.experience.length ? `<h2 style="font-size:1.4rem;color:#1a1a1a;border-bottom:2px solid #667eea;padding-bottom:8px;margin:30px 0 20px 0;"><i class="fas fa-briefcase" style="margin-right:10px;color:#667eea;"></i>Experience</h2>${formData.experience.map(exp => `<div style="margin-bottom:25px;"><h3 style="font-size:1.1rem;color:#333;margin:0 0 5px 0;">${exp.jobTitle} <strong>@ ${exp.company}</strong></h3><p style="color:#667eea;font-weight:600;margin:0 0 10px 0;">${exp.jobDates}</p>${exp.jobDesc ? `<p style="margin:0 0 0 20px;">${exp.jobDesc.replace(/\n/g, '<br>')}</p>` : ''}</div>`).join('')}` : ''}
                    ${formData.education.length ? `<h2 style="font-size:1.4rem;color:#1a1a1a;border-bottom:2px solid #667eea;padding-bottom:8px;margin:30px 0 20px 0;"><i class="fas fa-graduation-cap" style="margin-right:10px;color:#667eea;"></i>Education</h2>${formData.education.map(edu => `<div style="margin-bottom:20px;"><h3 style="font-size:1.1rem;color:#333;margin:0 0 5px 0;">${edu.degree}</h3><h4 style="color:#555;margin:0 0 5px 0;">${edu.school}</h4><p style="color:#667eea;font-weight:600;margin:0;">${edu.eduDates}</p></div>`).join('')}` : ''}
                    ${formData.skills.length ? `<h2 style="font-size:1.4rem;color:#1a1a1a;border-bottom:2px solid #667eea;padding-bottom:8px;margin:30px 0 20px 0;"><i class="fas fa-tools" style="margin-right:10px;color:#667eea;"></i>Skills</h2><div style="display:flex;flex-wrap:wrap;gap:10px;">${formData.skills.map(skill => `<span style="background:#f0f4ff;color:#667eea;padding:6px 14px;border-radius:20px;font-size:14px;font-weight:500;">${skill}</span>`).join('')}</div>` : ''}
                `;
                this.saveToLocalStorage();
            }

            downloadPDF() {
                const btn = document.getElementById('downloadPDF');
                const formData = this.getFormData();
                
                if (!formData.fullName) {
                    alert('Please enter your name first!');
                    return;
                }

                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';
                document.body.classList.add('loading');

                const pdfContent = document.createElement('div');
                pdfContent.style.cssText = 'font-family:Inter,Arial,sans-serif;max-width:210mm;margin:20mm auto;padding:0;line-height:1.6;color:#333;font-size:12pt;';
                pdfContent.innerHTML = `
                    <div style="text-align:center;margin-bottom:30px;">
                        <h1 style="font-size:2.2em;font-weight:700;color:#1a1a1a;margin:0 0 15px 0;">${formData.fullName}</h1>
                        <div style="display:flex;gap:25px;justify-content:center;flex-wrap:wrap;font-size:14px;">
                            ${formData.phone ? `<span style="color:#666;"><i style="margin-right:8px;color:#667eea;" class="fas fa-phone"></i>${formData.phone}</span>` : ''}
                            ${formData.email ? `<span style="color:#666;"><i style="margin-right:8px;color:#667eea;" class="fas fa-envelope"></i>${formData.email}</span>` : ''}
                            ${formData.location ? `<span style="color:#666;"><i style="margin-right:8px;color:#667eea;" class="fas fa-map-marker-alt"></i>${formData.location}</span>` : ''}
                        </div>
                    </div>
                    ${formData.summary ? `<div style="background:#f8f9ff;padding:25px;border-left:4px solid #667eea;margin:25px 0;"><h2 style="font-size:1.3em;color:#1a1a1a;margin:0 0 15px 0;">Summary</h2><p style="margin:0;font-size:14px;">${formData.summary.replace(/\n/g, '<br>')}</p></div>` : ''}
                    ${formData.experience.length ? `<h2 style="font-size:1.4em;color:#1a1a1a;border-bottom:3px solid #667eea;padding-bottom:10px;margin:30px 0 20px 0;">Experience</h2>${formData.experience.map(exp => `<div style="margin-bottom:25px;"><h3 style="font-size:1.1em;color:#1a1a1a;margin:0 0 8px 0;">${exp.jobTitle}</h3><h4 style="font-size:1em;color:#555;margin:0 0 8px 0;">${exp.company}</h4><p style="color:#667eea;font-weight:600;margin:0 0 12px 0;font-size:14px;">${exp.jobDates}</p>${exp.jobDesc ? `<p style="margin:0 0 0 15px;font-size:14px;">${exp.jobDesc.replace(/\n/g, '<br>')}</p>` : ''}</div>`).join('')}` : ''}
                    ${formData.education.length ? `<h2 style="font-size:1.4em;color:#1a1a1a;border-bottom:3px solid #667eea;padding-bottom:10px;margin:30px 0 20px 0;">Education</h2>${formData.education.map(edu => `<div style="margin-bottom:20px;"><h3 style="font-size:1.1em;color:#1a1a1a;margin:0 0 5px 0;">${edu.degree}</h3><h4 style="color:#555;margin:0 0 5px 0;">${edu.school}</h4><p style="color:#667eea;font-weight:600;margin:0;font-size:14px;">${edu.eduDates}</p></div>`).join('')}` : ''}
                    ${formData.skills.length ? `<h2 style="font-size:1.4em;color:#1a1a1a;border-bottom:3px solid #667eea;padding-bottom:10px;margin:30px 0 20px 0;">Skills</h2><div style="display:flex;flex-wrap:wrap;gap:12px;">${formData.skills.map(skill => `<span style="background:#f0f4ff;color:#667eea;padding:8px 16px;border-radius:25px;font-size:13px;font-weight:500;">${skill}</span>`).join('')}</div>` : ''}
                `;
                
                document.body.appendChild(pdfContent);

                const opt = {
                    margin: 0.5,
                    filename: `${formData.fullName.replace(/[^a-zA-Z0-9]/g, '_')}_Resume.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, letterRendering: true },
                    jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
                };

                html2pdf().set(opt).from(pdfContent).save().finally(() => {
                    document.body.removeChild(pdfContent);
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-download"></i> Download PDF';
                    document.body.classList.remove('loading');
                });
            }

            copyHTML() {
                const formData = this.getFormData();
                const html = this.generateCleanHTML(formData);
                navigator.clipboard.writeText(html).then(() => {
                    const btn = document.getElementById('copyHTML');
                    const original = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                    btn.style.background = '#10b981';
                    setTimeout(() => {
                        btn.innerHTML = original;
                        btn.style.background = '#6b7280';
                    }, 2000);
                });
            }

            generateCleanHTML(data) {
                return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${data.fullName} - Resume</title><style>body{font-family:Arial,sans-serif;max-width:800px;margin:40px auto;padding:20px;line-height:1.6;color:#333;}h1{font-size:2.2em;margin-bottom:10px;}h2{font-size:1.4em;border-bottom:2px solid #667eea;padding-bottom:10px;margin:30px 0 20px 0;}</style></head><body>${document.getElementById('cvPreview').innerHTML}</body></html>`;
            }

            saveToLocalStorage() {
                localStorage.setItem('cvData', JSON.stringify(this.getFormData()));
                localStorage.setItem('cvSkills', JSON.stringify(this.skills));
            }

            loadFromLocalStorage() {
                try {
                    const data = JSON.parse(localStorage.getItem('cvData') || '{}');
                    const skills = JSON.parse(localStorage.getItem('cvSkills') || '[]');
                    this.skills = skills;
                    this.renderSkills();
                    
                    Object.keys(data).forEach(key => {
                        const el = document.getElementById(key);
                        if (el) el.value = data[key] || '';
                    });
                    this.updatePreview();
                } catch (e) {}
            }
        }

        document.addEventListener('DOMContentLoaded', () => new CVMaker());
    </script>
