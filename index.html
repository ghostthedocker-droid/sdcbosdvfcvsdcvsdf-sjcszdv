<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Editor Pro - Click to Edit</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f0f2f5;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        .header {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 24px;
        }
        .header h1 { 
            font-size: 2.2em; 
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .header p { color: #666; font-size: 16px; }
        .toolbar {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        .btn-blue { background: #3b82f6; color: white; }
        .btn-blue:hover { background: #2563eb; transform: translateY(-1px); }
        .btn-green { background: #10b981; color: white; }
        .btn-green:hover { background: #059669; transform: translateY(-1px); }
        .btn-gray { background: #6b7280; color: white; }
        .btn-gray:hover { background: #4b5563; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        #pdfContainer {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            padding: 24px;
            min-height: 600px;
            position: relative;
        }
        #pdfCanvas {
            max-width: 100%;
            border-radius: 12px;
            cursor: crosshair !important;
            display: block;
            margin: 0 auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .page-info {
            text-align: center;
            padding: 20px 0;
            font-size: 18px;
            color: #374151;
            font-weight: 500;
        }
        .text-editor {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 2px solid #3b82f6;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            z-index: 10000;
            min-width: 340px;
            max-width: 420px;
        }
        .text-editor h3 {
            margin-bottom: 16px;
            color: #1f2937;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #editText {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            resize: vertical;
            margin-bottom: 16px;
            font-family: inherit;
        }
        #editText:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .font-control {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .font-control label {
            font-weight: 500;
            color: #374151;
            font-size: 14px;
        }
        #fontSize { width: 140px; }
        .editor-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .no-pdf {
            text-align: center;
            padding: 80px 40px;
            color: #6b7280;
        }
        .no-pdf svg {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
            opacity: 0.4;
        }
        .status-bar {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            transform: translateX(300px);
            transition: all 0.3s;
            z-index: 9999;
        }
        .status-bar.show { transform: translateX(0); }
        .status-bar.error { background: #ef4444; }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 9998;
            display: none;
        }
        @media (max-width: 768px) {
            .toolbar { flex-direction: column; }
            .text-editor { 
                width: 90vw;
                max-width: 400px;
                margin: 0;
                transform: none;
                top: 20px;
                left: 20px;
                right: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="status-bar" id="statusBar"></div>
    <div class="overlay" id="overlay"></div>
    
    <div class="container">
        <div class="header">
            <h1>📄 PDF Editor Pro</h1>
            <p>Upload PDF → Click anywhere → Edit text → Download</p>
        </div>

        <div class="toolbar">
            <input type="file" id="fileInput" accept=".pdf,application/pdf" style="display: none;">
            <label for="fileInput" class="btn btn-blue">
                📁 Select PDF File
            </label>
            <button id="downloadBtn" class="btn btn-green" disabled style="display: none;">
                💾 Download Edited PDF
            </button>
            <div id="pageNav" style="margin-left: auto; display: flex; gap: 8px; align-items: center;">
                <button id="prevBtn" class="btn btn-gray" disabled>← Prev</button>
                <span id="pageInfo" style="font-weight: 500; color: #374151;"></span>
                <button id="nextBtn" class="btn btn-gray" disabled>Next →</button>
            </div>
        </div>

        <div id="pdfContainer">
            <div class="no-pdf">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z"/>
                </svg>
                <h2>No PDF loaded</h2>
                <p>Select a PDF file above to start editing. Click anywhere to add text!</p>
            </div>
        </div>
    </div>

    <!-- Edit Overlay -->
    <div id="editOverlay" class="text-editor" style="display: none;">
        <h3>✏️ Add Text</h3>
        <textarea id="editText" placeholder="Click and type your text here..."></textarea>
        <div class="font-control">
            <label>Font Size: <span id="sizeDisplay">16</span>px</label>
            <input type="range" id="fontSize" min="10" max="40" value="16">
        </div>
        <div class="editor-buttons">
            <button id="cancelBtn" class="btn btn-gray">Cancel</button>
            <button id="saveBtn" class="btn btn-blue">✅ Save to PDF</button>
        </div>
    </div>

    <script>
        // Setup PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.js';

        // State
        let pdfDocument = null;
        let currentPage = 1;
        let numPages = 0;
        let modifiedPdfBytes = null;
        let clickPosition = { x: 0, y: 0 };

        // Elements
        const el = {
            fileInput: document.getElementById('fileInput'),
            downloadBtn: document.getElementById('downloadBtn'),
            pdfContainer: document.getElementById('pdfContainer'),
            pageInfo: document.getElementById('pageInfo'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            pageNav: document.getElementById('pageNav'),
            statusBar: document.getElementById('statusBar'),
            overlay: document.getElementById('overlay'),
            editOverlay: document.getElementById('editOverlay'),
            editText: document.getElementById('editText'),
            fontSize: document.getElementById('fontSize'),
            sizeDisplay: document.getElementById('sizeDisplay'),
            saveBtn: document.getElementById('saveBtn'),
            cancelBtn: document.getElementById('cancelBtn')
        };

        // Status messages
        function showStatus(msg, isError = false) {
            el.statusBar.textContent = msg;
            el.statusBar.className = `status-bar show ${isError ? 'error' : ''}`;
            setTimeout(() => el.statusBar.classList.remove('show'), 3000);
        }

        // Event listeners
        el.fileInput.addEventListener('change', loadPdf);
        el.downloadBtn.addEventListener('click', downloadPdf);
        el.prevBtn.addEventListener('click', () => changePage(-1));
        el.nextBtn.addEventListener('click', () => changePage(1));
        el.saveBtn.addEventListener('click', saveText);
        el.cancelBtn.addEventListener('click', hideEditor);
        el.fontSize.addEventListener('input', (e) => {
            el.sizeDisplay.textContent = e.target.value;
        });

        // Load PDF file
        async function loadPdf(e) {
            const file = e.target.files[0];
            if (!file) return;

            showStatus('Loading PDF...');
            el.pdfContainer.innerHTML = '<div style="text-align:center;padding:60px;color:#6b7280">Loading PDF...</div>';

            try {
                const arrayBuffer = await file.arrayBuffer();
                modifiedPdfBytes = new Uint8Array(arrayBuffer);

                pdfDocument = await pdfjsLib.getDocument(arrayBuffer).promise;
                numPages = pdfDocument.numPages;
                currentPage = 1;

                el.downloadBtn.disabled = false;
                el.downloadBtn.style.display = 'inline-flex';
                el.pageNav.style.display = 'flex';
                
                await renderPage();
                updateControls();
                showStatus(`PDF loaded! ${numPages} page${numPages === 1 ? '' : 's'}`);
                
            } catch (err) {
                showStatus('Failed to load PDF', true);
                console.error(err);
            }
        }

        // Render current page
        async function renderPage() {
            const page = await pdfDocument.getPage(currentPage);
            const scale = 1.4;
            const viewport = page.getViewport({ scale });

            const canvas = document.createElement('canvas');
            canvas.id = 'pdfCanvas';
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            const ctx = canvas.getContext('2d');

            el.pdfContainer.innerHTML = '';
            el.pdfContainer.appendChild(canvas);

            await page.render({ canvasContext: ctx, viewport }).promise;

            // **CRITICAL: Make clickable**
            canvas.addEventListener('click', handleCanvasClick, { once: false });
            canvas.style.cursor = 'crosshair';
            canvas.title = 'Click anywhere to add text';
        }

        // **FIXED CLICK HANDLER**
        function handleCanvasClick(e) {
            e.preventDefault();
            e.stopPropagation();

            const canvas = document.getElementById('pdfCanvas');
            const rect = canvas.getBoundingClientRect();
            
            // Precise coordinate calculation
            clickPosition.x = (e.clientX - rect.left) * (canvas.width / rect.width);
            clickPosition.y = (e.clientY - rect.top) * (canvas.height / rect.height);

            // Show editor
            el.editText.value = '';
            el.editText.focus();
            el.overlay.style.display = 'block';
            el.editOverlay.style.display = 'block';
            showStatus('✏️ Clicked! Now type your text...');
        }

        function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage >= 1 && newPage <= numPages) {
                currentPage = newPage;
                renderPage();
                updateControls();
            }
        }

        function updateControls() {
            el.pageInfo.textContent = `Page ${currentPage} of ${numPages}`;
            el.prevBtn.disabled = currentPage === 1;
            el.nextBtn.disabled = currentPage === numPages;
        }

        // Save text to PDF
        async function saveText() {
            const text = el.editText.value.trim();
            if (!text || !modifiedPdfBytes) return;

            try {
                const { PDFDocument, rgb } = PDFLib;
                const pdf = await PDFDocument.load(modifiedPdfBytes);
                const pages = pdf.getPages();
                const page = pages[currentPage - 1];
                const fontSize = parseInt(el.fontSize.value);

                // Draw text at exact click position (Y flipped for PDF coords)
                page.drawText(text, {
                    x: clickPosition.x,
                    y: page.getHeight() - clickPosition.y - fontSize * 0.8,
                    size: fontSize,
                    color: rgb(0, 0, 0),
                });

                modifiedPdfBytes = await pdf.save();
                hideEditor();
                renderPage(); // Refresh view
                showStatus('✅ Text added to PDF!');
                
            } catch (err) {
                showStatus('Error saving text', true);
                console.error(err);
            }
        }

        function hideEditor() {
            el.editOverlay.style.display = 'none';
            el.overlay.style.display = 'none';
        }

        function downloadPdf() {
            if (!modifiedPdfBytes) return;

            const blob = new Blob([modifiedPdfBytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `edited-pdf-${Date.now()}.pdf`;
            a.click();
            URL.revokeObjectURL(url);
            showStatus('📥 PDF downloaded!');
        }

        // Close editor on overlay click
        el.overlay.addEventListener('click', hideEditor);

        // ESC key to close editor
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') hideEditor();
        });

        showStatus('Ready! Upload PDF and click anywhere to edit.');
    </script>
</body>
</html>
