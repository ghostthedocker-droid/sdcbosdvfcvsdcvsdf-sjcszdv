<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Editor - Free Online</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .header h1 { 
            font-size: 2.8em; 
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .toolbar {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn-primary { 
            background: linear-gradient(45deg, #667eea, #764ba2); 
            color: white; 
        }
        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102,126,234,0.4);
        }
        .btn-success { 
            background: linear-gradient(45deg, #11998e, #38ef7d); 
            color: white; 
        }
        .btn-success:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(17,153,142,0.4);
        }
        .btn-secondary { 
            background: rgba(255,255,255,0.3); 
            color: #333; 
            backdrop-filter: blur(10px);
        }
        .btn-secondary:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        
        #pdfContainer {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 30px;
            min-height: 70vh;
            position: relative;
            overflow: auto;
        }
        #pdfCanvas { 
            border: 2px solid #e0e0e0; 
            border-radius: 12px;
            max-width: 100%;
            display: block;
            margin: 0 auto;
            cursor: text;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .page-info {
            text-align: center;
            margin: 25px 0;
            color: #666;
            font-size: 18px;
            font-weight: 500;
        }
        .text-editor {
            position: fixed;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(20px);
            border: 3px solid #667eea;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            z-index: 1000;
            min-width: 320px;
            max-width: 420px;
        }
        .text-editor h4 { 
            margin-bottom: 20px; 
            color: #333; 
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            resize: vertical;
            margin-bottom: 20px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .editor-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .editor-controls label { 
            font-size: 15px; 
            color: #555; 
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        input[type="range"] { 
            width: 150px; 
            height: 6px;
            border-radius: 3px;
            background: #e0e0e0;
            outline: none;
            cursor: pointer;
        }
        .editor-actions {
            display: flex;
            gap: 15px;
        }
        .no-pdf {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 500px;
            color: #888;
            text-align: center;
        }
        .no-pdf-icon {
            width: 120px;
            height: 120px;
            opacity: 0.3;
            margin-bottom: 30px;
        }
        .status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 999;
            transform: translateX(400px);
            transition: all 0.3s ease;
        }
        .status.show { transform: translateX(0); }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .btn { justify-content: center; }
            .text-editor { 
                position: fixed;
                top: 10px;
                left: 10px;
                right: 10px;
                max-width: none;
                padding: 20px;
            }
            .header h1 { font-size: 2em; }
        }
    </style>
</head>
<body>
    <div class="status" id="status"></div>
    
    <div class="container">
        <div class="header">
            <h1>✨ PDF Editor</h1>
            <p>Click anywhere on PDF to add/edit text • 100% free • No signup</p>
        </div>

        <div class="toolbar">
            <input type="file" id="pdfInput" accept="application/pdf,.pdf" style="display: none;">
            <label for="pdfInput" class="btn btn-primary">
                📁 Choose PDF File
            </label>
            
            <button id="downloadBtn" class="btn btn-success" style="display: none;">
                💾 Download PDF
            </button>

            <div class="page-controls" id="pageControls" style="display: none; margin-left: auto; flex-wrap: wrap;">
                <button id="prevPage" class="btn btn-secondary">← Previous</button>
                <span id="pageInfo" style="white-space: nowrap; font-weight: 500;"></span>
                <button id="nextPage" class="btn btn-secondary">Next →</button>
            </div>
        </div>

        <div id="pdfContainer">
            <div class="no-pdf" id="noPdfMessage">
                <svg class="no-pdf-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                    <polyline points="14,2 14,8 20,8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10,9 9,9 8,9"/>
                </svg>
                <h3>Upload your PDF to start editing</h3>
                <p style="max-width: 400px; opacity: 0.8;">
                    Select a PDF file above, then click anywhere on the page to add text!
                </p>
            </div>
        </div>
    </div>

    <!-- Text Editor Overlay -->
    <div id="textEditor" class="text-editor" style="display: none;">
        <h4>✏️ Add/Edit Text</h4>
        <textarea id="editText" placeholder="Type your text here..."></textarea>
        <div class="editor-controls">
            <label>
                📏 Size: <span id="fontSizeDisplay">14</span>px
                <input type="range" id="fontSize" min="8" max="36" value="14">
            </label>
        </div>
        <div class="editor-actions">
            <button id="saveText" class="btn btn-primary">✅ Save to PDF</button>
            <button id="cancelEdit" class="btn btn-secondary">❌ Cancel</button>
        </div>
    </div>

    <script>
        // Initialize PDF.js worker immediately
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // Global state
        let pdfDoc = null;
        let totalPages = 0;
        let currentPageNum = 1;
        let originalPdfBytes = null;
        let editPosition = { x: 0, y: 0 };

        // DOM elements
        const elements = {
            pdfInput: document.getElementById('pdfInput'),
            downloadBtn: document.getElementById('downloadBtn'),
            pdfContainer: document.getElementById('pdfContainer'),
            pageInfo: document.getElementById('pageInfo'),
            prevPageBtn: document.getElementById('prevPage'),
            nextPageBtn: document.getElementById('nextPage'),
            pageControls: document.getElementById('pageControls'),
            noPdfMessage: document.getElementById('noPdfMessage'),
            textEditor: document.getElementById('textEditor'),
            editText: document.getElementById('editText'),
            fontSizeSlider: document.getElementById('fontSize'),
            fontSizeDisplay: document.getElementById('fontSizeDisplay'),
            saveTextBtn: document.getElementById('saveText'),
            cancelEditBtn: document.getElementById('cancelEdit'),
            status: document.getElementById('status')
        };

        // Status helper
        function showStatus(message, timeout = 3000) {
            elements.status.textContent = message;
            elements.status.classList.add('show');
            if (timeout) {
                setTimeout(() => elements.status.classList.remove('show'), timeout);
            }
        }

        // Event listeners
        elements.pdfInput.addEventListener('change', handleFileSelect);
        elements.downloadBtn.addEventListener('click', downloadPDF);
        elements.prevPageBtn.addEventListener('click', () => goToPage(currentPageNum - 1));
        elements.nextPageBtn.addEventListener('click', () => goToPage(currentPageNum + 1));
        elements.saveTextBtn.addEventListener('click', saveTextEdit);
        elements.cancelEditBtn.addEventListener('click', hideTextEditor);
        elements.fontSizeSlider.addEventListener('input', (e) => {
            elements.fontSizeDisplay.textContent = e.target.value;
        });

        // File upload handler
        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file || !file.type.includes('pdf')) {
                showStatus('❌ Please select a valid PDF file', 4000);
                return;
            }

            showStatus('📥 Loading PDF...');
            try {
                const arrayBuffer = await file.arrayBuffer();
                originalPdfBytes = new Uint8Array(arrayBuffer);

                // Load PDF for rendering
                pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                totalPages = pdfDoc.numPages;
                currentPageNum = 1;

                elements.noPdfMessage.style.display = 'none';
                elements.downloadBtn.style.display = 'inline-flex';
                elements.pageControls.style.display = 'flex';
                
                await renderPage(currentPageNum);
                updatePageControls();
                showStatus(`✅ PDF loaded! ${totalPages} page${totalPages > 1 ? 's' : ''}`);
                
            } catch (error) {
                console.error('PDF load error:', error);
                showStatus('❌ Error loading PDF. Try another file.', 5000);
            }
        }

        // Render specific page
        async function renderPage(pageNum) {
            elements.pdfContainer.innerHTML = '<div style="text-align:center;padding:50px;color:#666;">Rendering page...</div>';
            
            try {
                const page = await pdfDoc.getPage(pageNum);
                const scale = Math.min(1.5, (window.innerWidth - 100) / page.getViewport({scale: 1}).width);
                const viewport = page.getViewport({ scale });

                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.id = 'pdfCanvas';
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                elements.pdfContainer.innerHTML = '';
                elements.pdfContainer.appendChild(canvas);

                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };

                await page.render(renderContext).promise;
                
                // Make canvas clickable for text editing
                setupCanvasInteraction(canvas);
                
            } catch (error) {
                console.error('Render error:', error);
                elements.pdfContainer.innerHTML = '<div style="text-align:center;padding:50px;color:#e74c3c;">Error rendering page</div>';
            }
        }

        // Setup canvas click-to-edit
        function setupCanvasInteraction(canvas) {
            canvas.style.cursor = 'text';
            canvas.addEventListener('click', (e) => {
                const rect = canvas.getBoundingClientRect();
                editPosition = {
                    x: (e.clientX - rect.left) * (canvas.width / rect.width),
                    y: (e.clientY - rect.top) * (canvas.height / rect.height)
                };
                
                elements.editText.value = '';
                elements.editText.focus();
                elements.textEditor.style.left = `${rect.left + editPosition.x / (canvas.width / rect.width) + 15}px`;
                elements.textEditor.style.top = `${rect.top + editPosition.y / (canvas.height / rect.height) + 15}px`;
                elements.textEditor.style.display = 'block';
            });
        }

        function goToPage(pageNum) {
            if (pageNum < 1 || pageNum > totalPages) return;
            currentPageNum = pageNum;
            renderPage(pageNum);
            updatePageControls();
        }

        function updatePageControls() {
            elements.pageInfo.textContent = `Page ${currentPageNum} of ${totalPages}`;
            elements.prevPageBtn.disabled = currentPageNum <= 1;
            elements.nextPageBtn.disabled = currentPageNum >= totalPages;
        }

        async function saveTextEdit() {
            const text = elements.editText.value.trim();
            if (!text || !originalPdfBytes) return;

            try {
                showStatus('💾 Saving text to PDF...');
                const { PDFDocument, rgb } = PDFLib;
                const pdfDocLib = await PDFDocument.load(originalPdfBytes);
                const pages = pdfDocLib.getPages();
                const page = pages[currentPageNum - 1];

                const fontSize = parseInt(elements.fontSizeSlider.value);
                page.drawText(text, {
                    x: editPosition.x,
                    y: page.getHeight() - editPosition.y - fontSize,
                    size: fontSize,
                    color: rgb(0 / 255, 0 / 255, 0 / 255),
                });

                originalPdfBytes = await pdfDocLib.save();
                hideTextEditor();
                renderPage(currentPageNum);
                showStatus('✅ Text saved successfully!');
                
            } catch (error) {
                console.error('Save error:', error);
                showStatus('❌ Error saving text', 4000);
            }
        }

        function hideTextEditor() {
            elements.textEditor.style.display = 'none';
        }

        function downloadPDF() {
            if (!originalPdfBytes) {
                showStatus('❌ No PDF to download');
                return;
            }

            const blob = new Blob([originalPdfBytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `edited-${Date.now()}.pdf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showStatus('📥 PDF downloaded!');
        }

        // Hide editor on outside click
        document.addEventListener('click', (e) => {
            if (!elements.textEditor.contains(e.target) && e.target.id !== 'pdfInput') {
                hideTextEditor();
            }
        });

        // Drag editor (optional enhancement)
        let isDragging = false;
        elements.textEditor.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'H4') {
                isDragging = true;
            }
        });
        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                elements.textEditor.style.left = e.pageX - 150 + 'px';
                elements.textEditor.style.top = e.pageY - 50 + 'px';
            }
        });
        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        showStatus('✅ Ready! Click "Choose PDF File" to start editing');
    </script>
</body>
</html>
