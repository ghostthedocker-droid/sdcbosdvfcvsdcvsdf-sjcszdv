<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D QR Code Generator</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Inter', sans-serif;
    background: #e0e5ec;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    perspective: 1000px;
  }

  .card {
    background: #e0e5ec;
    border-radius: 25px;
    box-shadow: 20px 20px 60px #bebebe, -20px -20px 60px #ffffff;
    padding: 40px;
    text-align: center;
    max-width: 450px;
    width: 100%;
    transition: transform 0.2s ease;
  }

  h1 {
    font-weight: 600;
    color: #333;
    margin-bottom: 20px;
    font-size: 1.8rem;
  }

  select, input[type=text], input[type=color] {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    border: none;
    outline: none;
    font-size: 16px;
    box-shadow: inset 5px 5px 10px #bebebe,
                inset -5px -5px 10px #ffffff;
    background: #e0e5ec;
  }

  button {
    padding: 12px 20px;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    background: #e0e5ec;
    box-shadow: 5px 5px 10px #bebebe,
                -5px -5px 10px #ffffff;
    transition: all 0.3s ease;
  }

  button:hover {
    box-shadow: inset 5px 5px 10px #bebebe,
                inset -5px -5px 10px #ffffff;
  }

  #qrcode {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
  }

  .actions {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 15px;
  }

  .history {
    margin-top: 25px;
    max-height: 150px;
    overflow-y: auto;
    text-align: left;
  }

  .history-item {
    background: #e0e5ec;
    margin: 5px 0;
    padding: 5px 10px;
    border-radius: 12px;
    box-shadow: inset 2px 2px 5px #bebebe,
                inset -2px -2px 5px #ffffff;
    font-size: 14px;
  }

  /* Responsive */
  @media(max-width: 500px){
    .card {
      padding: 25px;
    }
    h1 {
      font-size: 1.5rem;
    }
    button, input, select {
      font-size: 14px;
    }
  }
</style>
</head>
<body>
<div class="card" id="card">
  <h1>3D QR Generator</h1>

  <select id="type">
    <option value="text">Text / URL</option>
    <option value="wifi">Wi-Fi</option>
    <option value="vcard">vCard</option>
    <option value="email">Email</option>
    <option value="sms">SMS</option>
    <option value="phone">Phone</option>
    <option value="event">Event</option>
    <option value="crypto">Crypto Payment</option>
  </select>

  <input type="text" id="input1" placeholder="Enter text / URL / Name / etc">
  <input type="text" id="input2" placeholder="Additional info (optional)">
  
  <label>Foreground Color:</label>
  <input type="color" id="fgcolor" value="#000000">
  <label>Background Color:</label>
  <input type="color" id="bgcolor" value="#ffffff">

  <select id="ecLevel">
    <option value="L">Error Correction: Low</option>
    <option value="M" selected>Medium</option>
    <option value="Q">Quartile</option>
    <option value="H">High</option>
  </select>

  <button onclick="generateQR()">Generate QR</button>

  <div class="actions">
    <button onclick="downloadQR()">Download PNG</button>
    <button onclick="copyQR()">Copy to Clipboard</button>
  </div>

  <div id="qrcode"></div>

  <div class="history">
    <h3>History</h3>
    <div id="historyList"></div>
  </div>
</div>

<script>
let historyData = [];

function generateQR() {
  const type = document.getElementById('type').value;
  const input1 = document.getElementById('input1').value.trim();
  const input2 = document.getElementById('input2').value.trim();
  const fg = document.getElementById('fgcolor').value;
  const bg = document.getElementById('bgcolor').value;
  const ec = document.getElementById('ecLevel').value;

  if (!input1) return alert("Please enter required input!");

  let qrText = "";

  switch(type){
    case "text": qrText = input1; break;
    case "wifi": qrText = `WIFI:T:WPA;S:${input1};P:${input2};;`; break;
    case "vcard": qrText = `BEGIN:VCARD\nVERSION:3.0\nFN:${input1}\nORG:${input2}\nEND:VCARD`; break;
    case "email": qrText = `mailto:${input1}?subject=${input2}`; break;
    case "sms": qrText = `SMSTO:${input1}:${input2}`; break;
    case "phone": qrText = `tel:${input1}`; break;
    case "event": qrText = `BEGIN:VEVENT\nSUMMARY:${input1}\nDESCRIPTION:${input2}\nEND:VEVENT`; break;
    case "crypto": qrText = `bitcoin:${input1}?amount=${input2}`; break;
  }

  const container = document.getElementById('qrcode');
  container.innerHTML = '';
  QRCode.toCanvas(document.createElement('canvas'), qrText, { 
    width: 220, 
    color: { dark: fg, light: bg }, 
    errorCorrectionLevel: ec
  }, function (error, canvas) {
    if (error) console.error(error);
    container.appendChild(canvas);
    saveHistory(qrText);
  });
}

function downloadQR() {
  const canvas = document.querySelector('#qrcode canvas');
  if (!canvas) return alert("Generate QR first!");
  const link = document.createElement('a');
  link.download = 'qrcode.png';
  link.href = canvas.toDataURL();
  link.click();
}

function copyQR() {
  const canvas = document.querySelector('#qrcode canvas');
  if (!canvas) return alert("Generate QR first!");
  canvas.toBlob(blob => {
    const item = new ClipboardItem({ "image/png": blob });
    navigator.clipboard.write([item]);
    alert("QR copied to clipboard!");
  });
}

function saveHistory(text) {
  historyData.unshift(text);
  if(historyData.length > 10) historyData.pop(); 
  const list = document.getElementById('historyList');
  list.innerHTML = historyData.map(item => `<div class="history-item">${item}</div>`).join('');
}

// 3D Hover Animation
const card = document.getElementById('card');
document.addEventListener('mousemove', (e) => {
  const x = (window.innerWidth / 2 - e.pageX) / 25;
  const y = (window.innerHeight / 2 - e.pageY) / 25;
  card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

document.addEventListener('mouseleave', () => {
  card.style.transform = 'rotateY(0deg) rotateX(0deg)';
});
</script>
</body>
</html>
