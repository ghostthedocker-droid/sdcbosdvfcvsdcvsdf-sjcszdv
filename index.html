<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive PDF Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.8.162/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
<style>
  body { font-family: Arial; text-align: center; margin: 20px; }
  #pdf-container { width: 80%; margin: 20px auto; }
  .page-container { position: relative; margin-bottom: 20px; }
  canvas.pdf-page { border: 1px solid #000; display: block; }
  canvas.fabric-canvas { position: absolute; left: 0; top: 0; }
  #controls { margin-top: 10px; }
  input, button { margin: 5px; }
</style>
</head>
<body>

<h1>Interactive PDF Editor</h1>
<input type="file" id="file-input" accept="application/pdf">
<div id="pdf-container"></div>
<div id="controls">
  <input type="text" id="annotation-text" placeholder="Enter text">
  <button id="add-text-btn">Add Text</button>
  <button id="download-btn">Download PDF</button>
</div>

<script>
let pdfDoc = null;
let fabricCanvases = [];
let currentPdfBytes = null;

const pdfContainer = document.getElementById('pdf-container');

// Load PDF
document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  currentPdfBytes = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument({ data: currentPdfBytes }).promise;

  pdfContainer.innerHTML = '';
  fabricCanvases = [];

  for (let i = 1; i <= pdfDoc.numPages; i++) {
    const page = await pdfDoc.getPage(i);
    const viewport = page.getViewport({ scale: 1.5 });

    // Container for PDF page + Fabric overlay
    const pageDiv = document.createElement('div');
    pageDiv.className = 'page-container';
    pageDiv.style.width = viewport.width + 'px';
    pageDiv.style.height = viewport.height + 'px';
    pdfContainer.appendChild(pageDiv);

    // PDF Canvas
    const pdfCanvas = document.createElement('canvas');
    pdfCanvas.className = 'pdf-page';
    pdfCanvas.width = viewport.width;
    pdfCanvas.height = viewport.height;
    pageDiv.appendChild(pdfCanvas);
    const ctx = pdfCanvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;

    // Fabric overlay
    const fabricCanvasEl = document.createElement('canvas');
    fabricCanvasEl.className = 'fabric-canvas';
    fabricCanvasEl.width = viewport.width;
    fabricCanvasEl.height = viewport.height;
    pageDiv.appendChild(fabricCanvasEl);

    const fabricCanvas = new fabric.Canvas(fabricCanvasEl, { selection: true });
    fabricCanvases.push(fabricCanvas);
  }
});

// Add text
document.getElementById('add-text-btn').addEventListener('click', () => {
  const text = document.getElementById('annotation-text').value;
  if (!text) return alert('Enter text!');
  if (!fabricCanvases.length) return alert('Upload a PDF first!');

  // Add text to the first page for simplicity
  const fabricCanvas = fabricCanvases[0];
  const textbox = new fabric.Textbox(text, {
    left: 50,
    top: 50,
    fontSize: 24,
    fill: 'red',
    editable: true
  });
  fabricCanvas.add(textbox);
  fabricCanvas.setActiveObject(textbox);
});

// Download PDF
document.getElementById('download-btn').addEventListener('click', async () => {
  if (!currentPdfBytes) return alert('Upload a PDF first!');
  const pdfLibDoc = await PDFLib.PDFDocument.load(currentPdfBytes);
  const pages = pdfLibDoc.getPages();

  for (let i = 0; i < fabricCanvases.length; i++) {
    const fabricCanvas = fabricCanvases[i];
    const pngDataUrl = fabricCanvas.toDataURL({ format: 'png' });
    const pngBytes = await fetch(pngDataUrl).then(res => res.arrayBuffer());
    const pngImage = await pdfLibDoc.embedPng(pngBytes);

    const { width, height } = pages[i].getSize();
    pages[i].drawImage(pngImage, { x: 0, y: 0, width, height });
  }

  const pdfBytes = await pdfLibDoc.save();
  const blob = new Blob([pdfBytes], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = 'edited.pdf';
  a.click();
  URL.revokeObjectURL(url);
});
</script>

</body>
</html>
