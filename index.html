<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PDF Editor</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
    canvas { border: 1px solid #333; margin-top: 10px; display: block; }
    #controls { margin-top: 10px; }
    #textInput { width: 200px; }
  </style>
</head>
<body>
  <h1>Simple PDF Editor</h1>
  <input type="file" id="upload" accept="application/pdf" />
  <canvas id="pdfCanvas"></canvas>

  <div id="controls">
    <input type="text" id="textInput" placeholder="Enter text to add" />
    <button id="addTextBtn">Add Text</button>
    <button id="downloadBtn">Download PDF</button>
  </div>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.10.141/pdf.min.js"></script>
  <!-- pdf-lib -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.20.0/pdf-lib.min.js"></script>

  <script>
    const uploadInput = document.getElementById('upload');
    const canvas = document.getElementById('pdfCanvas');
    const ctx = canvas.getContext('2d');
    const addTextBtn = document.getElementById('addTextBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const textInput = document.getElementById('textInput');

    let pdfBytes, pdfDoc, modifiedPdfBytes;

    uploadInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      pdfBytes = await file.arrayBuffer();

      // Render first page
      const loadingTask = pdfjsLib.getDocument(pdfBytes);
      pdfDoc = await loadingTask.promise;
      const page = await pdfDoc.getPage(1);
      const viewport = page.getViewport({ scale: 1.5 });
      canvas.width = viewport.width;
      canvas.height = viewport.height;

      await page.render({ canvasContext: ctx, viewport: viewport }).promise;
      alert('PDF loaded! Now you can add text.');
    });

    addTextBtn.addEventListener('click', async () => {
      if (!pdfBytes) return alert('Upload a PDF first!');
      const text = textInput.value || 'Hello';
      const pdfDocLib = await PDFLib.PDFDocument.load(pdfBytes);
      const pages = pdfDocLib.getPages();
      const firstPage = pages[0];

      // Draw text at fixed position
      firstPage.drawText(text, { x: 50, y: 400, size: 24, color: PDFLib.rgb(0, 0, 0) });

      modifiedPdfBytes = await pdfDocLib.save();

      // Preview new PDF on canvas
      const loadingTask = pdfjsLib.getDocument(modifiedPdfBytes);
      const newPdf = await loadingTask.promise;
      const page = await newPdf.getPage(1);
      const viewport = page.getViewport({ scale: 1.5 });
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      await page.render({ canvasContext: ctx, viewport: viewport }).promise;

      alert('Text added! Click "Download PDF" to save.');
    });

    downloadBtn.addEventListener('click', () => {
      if (!modifiedPdfBytes) return alert('Add text first!');
      const blob = new Blob([modifiedPdfBytes], { type: 'application/pdf' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'edited.pdf';
      link.click();
    });
  </script>
</body>
</html>
