<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHunt OSINT - Email Recon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🕵️ GHunt OSINT Tool</h1>
            <p>Google Account Enumeration & Reconnaissance</p>
        </div>
        
        <div class="input-section">
            <input type="email" id="emailInput" placeholder="Enter email address (e.g. target@gmail.com)">
            <button onclick="searchEmail()">🔍 Search</button>
        </div>
        
        <div id="loading" class="loading hidden">Scanning Google services...</div>
        
        <div id="results" class="results hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
