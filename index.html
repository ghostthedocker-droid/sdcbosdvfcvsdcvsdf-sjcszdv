<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern CV Maker - Professional Resume Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --primary-dark: #5a67d8;
            --accent: #10b981;
            --accent-dark: #059669;
            --dark: #1a1a1a;
            --gray-900: #111827;
            --gray-800: #1f2937;
            --gray-700: #374151;
            --gray-600: #4b5563;
            --gray-500: #6b7280;
            --gray-300: #d1d5db;
            --gray-100: #f3f4f6;
            --white: #ffffff;
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            --shadow-xl: 0 35px 60px -12px rgba(0, 0, 0, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--primary);
            min-height: 100vh; 
            padding: 20px; 
            color: var(--gray-800);
        }

        .container { max-width: 1600px; margin: 0 auto; }
        header { 
            text-align: center; 
            background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(20px);
            border-radius: 24px; 
            padding: 40px 30px; 
            margin-bottom: 40px;
            color: white; 
            border: 1px solid rgba(255,255,255,0.2);
        }
        header h1 { 
            font-size: clamp(2rem, 5vw, 3.5rem); 
            font-weight: 800; 
            background: linear-gradient(135deg, white 0%, #f3f4f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }
        header p { font-size: 1.3rem; opacity: 0.95; font-weight: 400; }

        .main-content { 
            display: grid; 
            grid-template-columns: 1fr 520px; 
            gap: 32px; 
            align-items: start; 
        }

        .panel { 
            background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(20px);
            border-radius: 24px; 
            box-shadow: var(--shadow-xl);
            border: 1px solid rgba(255,255,255,0.2);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .panel:hover { transform: translateY(-4px); box-shadow: 0 40px 80px -16px rgba(0,0,0,0.35); }

        .panel-header { 
            background: linear-gradient(135deg, var(--gray-900) 0%, var(--gray-800) 100%);
            color: white; 
            padding: 24px 32px; 
            display: flex; 
            align-items: center; 
            gap: 16px;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .editor-content, .preview-content { padding: 32px; }
        .section { 
            margin-bottom: 32px; 
            padding: 24px; 
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-radius: 16px; 
            border: 1px solid rgba(148, 163, 184, 0.2);
            transition: all 0.3s ease;
        }
        .section:hover { 
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.08);
        }
        .section h3 { 
            color: var(--gray-800); 
            margin-bottom: 20px; 
            font-size: 1.1rem; 
            font-weight: 700;
            display: flex; align-items: center; gap: 12px;
        }

        .form-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 16px; 
            margin-bottom: 16px; 
        }
        .form-group.full { grid-column: 1 / -1; }

        input, textarea, select { 
            padding: 16px 20px; 
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            font-size: 15px; 
            font-family: inherit;
            background: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
        }
        input:focus, textarea:focus, select:focus { 
            outline: none; 
            border-color: #667eea; 
            box-shadow: 0 0 0 4px rgba(102,126,234,0.15);
            transform: translateY(-1px);
        }
        textarea { resize: vertical; min-height: 100px; }

        .btn { 
            padding: 14px 28px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 15px; 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }
        .btn-primary { 
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: white;
            box-shadow: 0 8px 24px rgba(16,185,129,0.4);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 16px 32px rgba(16,185,129,0.5); }
        .btn-secondary { 
            background: linear-gradient(135deg, var(--gray-600) 0%, var(--gray-700) 100%);
            color: white;
        }
        .btn-secondary:hover { transform: translateY(-2px); }
        .btn-small { padding: 10px 20px; font-size: 14px; }

        .dynamic-item { 
            background: white; 
            padding: 24px; 
            border-radius: 16px; 
            margin-bottom: 20px; 
            border: 2px dashed #e2e8f0; 
            transition: all 0.3s ease;
            position: relative;
        }
        .dynamic-item:hover { border-color: #667eea; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
        .remove-btn { 
            position: absolute; 
            top: 16px; right: 16px; 
            background: #ef4444; 
            color: white; 
            width: 36px; height: 36px; 
            border-radius: 50%; 
            border: none; 
            font-size: 14px; 
            cursor: pointer;
        }

        /* Template Switcher */
        .template-switcher {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .template-btn {
            padding: 12px 20px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .template-btn.active, .template-btn:hover {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* Preview */
        .cv-preview { 
            background: white; 
            height: 1120px; /* A4 height */
            border-radius: 12px; 
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            position: relative;
            font-family: 'Poppins', sans-serif;
        }
        .cv-preview.template-1 { background: linear-gradient(145deg, #fafbff 0%, #e8f2ff 100%); }
        .cv-preview.template-2 { background: linear-gradient(145deg, #fef7ff 0%, #fff1f7 100%); }
        .cv-preview.template-3 { background: linear-gradient(145deg, #f8fff8 0%, #e8fff2 100%); }
        .cv-preview.template-4 { background: linear-gradient(145deg, #fffaf0 0%, #fff5e6 100%); }
        .cv-preview.template-5 { background: linear-gradient(145deg, #f0f9ff 0%, #e0f2fe 100%); }

        .cv-header { 
            padding: 60px 50px 40px; 
            text-align: center; 
            border-bottom: 4px solid transparent;
            background: rgba(255,255,255,0.7);
            position: relative;
        }
        .cv-preview.template-1 .cv-header { border-bottom-color: #667eea; }
        .cv-preview.template-2 .cv-header { border-bottom-color: #ec4899; }
        .cv-preview.template-3 .cv-header { border-bottom-color: var(--accent); }
        .cv-preview.template-4 .cv-header { border-bottom-color: #f59e0b; }
        .cv-preview.template-5 .cv-header { border-bottom-color: #0ea5e9; }

        .cv-preview h1 { 
            font-size: 3.2rem; 
            font-weight: 800; 
            background: linear-gradient(135deg, var(--gray-900) 0%, var(--gray-700) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            letter-spacing: -0.03em;
        }
        .cv-preview .contact-bar { 
            display: flex; 
            gap: 32px; 
            justify-content: center; 
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .cv-preview .contact-item { 
            color: var(--gray-600); 
            font-weight: 500; 
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cv-preview .contact-item a { color: #667eea; text-decoration: none; }

        .cv-preview .cv-section { 
            padding: 0 50px 40px; 
            max-width: 700px;
            margin: 0 auto;
        }
        .cv-preview h2 { 
            font-size: 1.6rem; 
            font-weight: 700; 
            margin: 50px 0 30px 0;
            padding-bottom: 16px;
            position: relative;
        }
        .cv-preview h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            width: 60px;
            border-radius: 2px;
        }
        .cv-preview.template-1 h2::after { background: linear-gradient(90deg, #667eea, #764ba2); }
        .cv-preview.template-2 h2::after { background: linear-gradient(90deg, #ec4899, #db2777); }
        .cv-preview.template-3 h2::after { background: linear-gradient(90deg, var(--accent), var(--accent-dark)); }
        .cv-preview.template-4 h2::after { background: linear-gradient(90deg, #f59e0b, #d97706); }
        .cv-preview.template-5 h2::after { background: linear-gradient(90deg, #0ea5e9, #0284c7); }

        .cv-preview h3 { 
            font-size: 1.2rem; 
            color: var(--gray-900); 
            margin: 24px 0 12px 0;
            font-weight: 700;
        }
        .cv-preview .meta { 
            color: #667eea; 
            font-weight: 600; 
            font-size: 15px;
            margin-bottom: 12px;
        }
        .cv-preview .desc { 
            color: var(--gray-700); 
            line-height: 1.7; 
            margin-bottom: 8px;
        }
        .skills-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 12px; 
            margin-top: 20px; 
        }
        .skill-tag { 
            background: rgba(102,126,234,0.1); 
            color: #667eea; 
            padding: 12px 20px; 
            border-radius: 25px; 
            text-align: center; 
            font-weight: 600; 
            font-size: 14px;
            border: 1px solid rgba(102,126,234,0.2);
        }

        .preview-controls { 
            background: rgba(255,255,255,0.5); 
            backdrop-filter: blur(10px);
            padding: 24px; 
            border-radius: 16px; 
            display: flex; 
            gap: 16px; 
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* Animations */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .panel { animation: fadeInUp 0.6s ease-out; }

        /* Responsive */
        @media (max-width: 1200px) { .main-content { grid-template-columns: 1fr; } .preview { order: -1; } }
        @media (max-width: 768px) { 
            .form-row { grid-template-columns: 1fr; } 
            .cv-preview { height: auto; padding: 20px; margin: 0 10px; }
            .cv-header { padding: 40px 20px; }
            .cv-preview h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-file-signature"></i> Modern CV</h1>
            <p>Build stunning professional resumes with 5+ premium templates</p>
        </header>

        <div class="main-content">
            <!-- Editor Panel -->
            <div class="panel">
                <div class="panel-header">
                    <i class="fas fa-edit"></i>
                    <span>CV Editor</span>
                </div>
                <div class="editor-content">
                    <!-- Template Switcher -->
                    <div class="template-switcher">
                        <button class="template-btn active" data-template="1">Classic Blue</button>
                        <button class="template-btn" data-template="2">Pink Modern</button>
                        <button class="template-btn" data-template="3">Green Pro</button>
                        <button class="template-btn" data-template="4">Golden Exec</button>
                        <button class="template-btn" data-template="5">Blue Corp</button>
                    </div>

                    <form id="cvForm">
                        <!-- Personal Info -->
                        <div class="section">
                            <h3><i class="fas fa-user"></i> Personal Information</h3>
                            <div class="form-row">
                                <input type="text" id="fullName" placeholder="Full Name *" required>
                                <input type="text" id="jobTitle" placeholder="Job Title">
                            </div>
                            <div class="form-row">
                                <input type="tel" id="phone" placeholder="Phone">
                                <input type="email" id="email" placeholder="Email">
                            </div>
                            <div class="form-row">
                                <input type="text" id="location" placeholder="Location">
                                <input type="url" id="linkedin" placeholder="LinkedIn">
                            </div>
                            <input type="url" id="portfolio" class="form-group full" placeholder="Portfolio / Website">
                        </div>

                        <!-- Summary -->
                        <div class="section">
                            <h3><i class="fas fa-quote-left"></i> Professional Summary</h3>
                            <textarea id="summary" placeholder="Highlight your experience, skills, and career goals..."></textarea>
                        </div>

                        <!-- Experience -->
                        <div class="section">
                            <h3><i class="fas fa-briefcase"></i> Work Experience</h3>
                            <div id="experienceItems"></div>
                            <button type="button" id="addExperience" class="btn btn-primary btn-small">
                                <i class="fas fa-plus"></i> Add Experience
                            </button>
                        </div>

                        <!-- Education -->
                        <div class="section">
                            <h3><i class="fas fa-graduation-cap"></i> Education</h3>
                            <div id="educationItems"></div>
                            <button type="button" id="addEducation" class="btn btn-primary btn-small">
                                <i class="fas fa-plus"></i> Add Education
                            </button>
                        </div>

                        <!-- Skills -->
                        <div class="section">
                            <h3><i class="fas fa-star"></i> Skills</h3>
                            <div style="display:flex;gap:12px;margin-bottom:16px;">
                                <input type="text" id="skillInput" placeholder="Add skill (JavaScript, Python...)" style="flex:1;">
                                <button type="button" id="addSkill" class="btn btn-primary btn-small">Add</button>
                            </div>
                            <div id="skillsList" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Preview Panel -->
            <div class="panel">
                <div class="panel-header">
                    <i class="fas fa-eye"></i>
                    <span>Live Preview</span>
                </div>
                <div class="preview-content">
                    <div class="preview-controls">
                        <button id="downloadPDF" class="btn btn-primary" style="flex:1;">
                            <i class="fas fa-download"></i> Download PDF
                        </button>
                        <button id="copyHTML" class="btn btn-secondary" style="flex:1;">
                            <i class="fas fa-copy"></i> Copy HTML
                        </button>
                    </div>
                    <div id="cvPreview" class="cv-preview template-1"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class ModernCVMaker {
            constructor() {
                this.currentTemplate = 1;
                this.skills = [];
                this.init();
            }

            init() {
                this.bindEvents();
                this.renderExperience();
                this.renderEducation();
                this.renderSkills();
                this.updatePreview();
                this.loadFromStorage();
            }

            bindEvents() {
                // Form inputs
                document.querySelectorAll('#cvForm input, #cvForm textarea').forEach(el => {
                    el.addEventListener('input', () => this.updatePreview());
                });

                // Template switcher
                document.querySelectorAll('.template-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelector('.template-btn.active').classList.remove('active');
                        e.target.classList.add('active');
                        this.currentTemplate = parseInt(e.target.dataset.template);
                        document.getElementById('cvPreview').className = `cv-preview template-${this.currentTemplate}`;
                        this.updatePreview();
                    });
                });

                // Dynamic sections
                document.getElementById('addExperience').addEventListener('click', () => this.addExperience());
                document.getElementById('addEducation').addEventListener('click', () => this.addEducation());
                document.getElementById('addSkill').addEventListener('click', () => this.addSkill());
                document.getElementById('skillInput').addEventListener('keypress', e => e.key === 'Enter' && this.addSkill());

                // Actions
                document.getElementById('downloadPDF').addEventListener('click', () => this.downloadPDF());
                document.getElementById('copyHTML').addEventListener('click', () => this.copyHTML());

                // Remove items
                document.addEventListener('click', e => {
                    if (e.target.matches('.remove-btn')) {
                        e.target.closest('.dynamic-item').remove();
                        this.updatePreview();
                    }
                    if (e.target.matches('.skill-remove')) {
                        this.skills.splice(e.target.dataset.index, 1);
                        this.renderSkills();
                        this.updatePreview();
                    }
                });
            }

            renderExperience() {
                const container = document.getElementById('experienceItems');
                if (!container.children.length) {
                    container.innerHTML = this.createExperienceItem();
                }
            }

            renderEducation() {
                const container = document.getElementById('educationItems');
                if (!container.children.length) {
                    container.innerHTML = this.createEducationItem();
                }
            }

            createExperienceItem() {
                return `
                    <div class="dynamic-item">
                        <button class="remove-btn" type="button"><i class="fas fa-times"></i></button>
                        <div class="form-row">
                            <input type="text" class="jobTitle" placeholder="Job Title">
                            <input type="text" class="company" placeholder="Company / Organization">
                        </div>
                        <div class="form-row">
                            <input type="text" class="jobDates" placeholder="Dates (Jan 2022 - Present)">
                            <input type="text" class="location" placeholder="Location">
                        </div>
                        <textarea class="jobDesc" placeholder="Key achievements and responsibilities..."></textarea>
                    </div>
                `;
            }

            createEducationItem() {
                return `
                    <div class="dynamic-item">
                        <button class="remove-btn" type="button"><i class="fas fa-times"></i></button>
                        <div class="form-row">
                            <input type="text" class="degree" placeholder="Degree / Diploma">
                            <input type="text" class="school" placeholder="University / School">
                        </div>
                        <div class="form-row">
                            <input type="text" class="eduDates" placeholder="Dates (2018 - 2022)">
                            <input type="text" class="eduGpa" placeholder="GPA / Grade">
                        </div>
                    </div>
                `;
            }

            addExperience() {
                document.getElementById('experienceItems').insertAdjacentHTML('beforeend', this.createExperienceItem());
                this.bindDynamicInputs();
            }

            addEducation() {
                document.getElementById('educationItems').insertAdjacentHTML('beforeend', this.createEducationItem());
                this.bindDynamicInputs();
            }

            bindDynamicInputs() {
                document.querySelectorAll('.dynamic-item input, .dynamic-item textarea').forEach(input => {
                    input.addEventListener('input', () => this.updatePreview());
                });
            }

            addSkill() {
                const input = document.getElementById('skillInput');
                const skill = input.value.trim();
                if (skill && !this.skills.includes(skill)) {
                    this.skills.push(skill);
                    input.value = '';
                    this.renderSkills();
                    this.updatePreview();
                }
            }

            renderSkills() {
                const container = document.getElementById('skillsList');
                container.innerHTML = this.skills.map((skill, i) => 
                    `<div class="skill-tag" style="background:#e0e7ff;color:#4338ca;padding:10px 16px;border-radius:20px;font-weight:600;font-size:14px;cursor:pointer;">
                        ${skill} <button class="skill-remove" data-index="${i}" style="margin-left:8px;background:none;border:none;color:#4338ca;font-size:16px;">×</button>
                    </div>`
                ).join('');
            }

            getFormData() {
                return {
                    template: this.currentTemplate,
                    fullName: document.getElementById('fullName')?.value || '',
                    jobTitle: document.getElementById('jobTitle')?.value || '',
                    phone: document.getElementById('phone')?.value || '',
                    email: document.getElementById('email')?.value || '',
                    location: document.getElementById('location')?.value || '',
                    linkedin: document.getElementById('linkedin')?.value || '',
                    portfolio: document.getElementById('portfolio')?.value || '',
                    summary: document.getElementById('summary')?.value || '',
                    experience: Array.from(document.querySelectorAll('#experienceItems .dynamic-item')).map(item => ({
                        jobTitle: item.querySelector('.jobTitle')?.value || '',
                        company: item.querySelector('.company')?.value || '',
                        jobDates: item.querySelector('.jobDates')?.value || '',
                        location: item.querySelector('.location')?.value || '',
                        jobDesc: item.querySelector('.jobDesc')?.value || ''
                    })).filter(exp => exp.jobTitle || exp.company),
                    education: Array.from(document.querySelectorAll('#educationItems .dynamic-item')).map(item => ({
                        degree: item.querySelector('.degree')?.value || '',
                        school: item.querySelector('.school')?.value || '',
                        eduDates: item.querySelector('.eduDates')?.value || '',
                        eduGpa: item.querySelector('.eduGpa')?.value || ''
                    })).filter(edu => edu.degree || edu.school),
                    skills: this.skills
                };
            }

            updatePreview() {
                const data = this.getFormData();
                const preview = document.getElementById('cvPreview');
                
                if (!data.fullName) return;

                preview.innerHTML = `
                    <div class="cv-header">
                        <h1>${data.fullName}</h1>
                        ${data.jobTitle ? `<h2 style="color:var(--gray-600);font-weight:500;font-size:1.3rem;margin-top:8px;">${data.jobTitle}</h2>` : ''}
                        <div class="contact-bar">
                            ${data.phone ? `<div class="contact-item"><i class="fas fa-phone"></i>${data.phone}</div>` : ''}
                            ${data.email ? `<div class="contact-item"><i class="fas fa-envelope"></i>${data.email}</div>` : ''}
                            ${data.location ? `<div class="contact-item"><i class="fas fa-map-marker-alt"></i>${data.location}</div>` : ''}
                            ${data.linkedin ? `<div class="contact-item"><i class="fab fa-linkedin"></i><a href="${data.linkedin}" target="_blank">LinkedIn</a></div>` : ''}
                            ${data.portfolio ? `<div class="contact-item"><i class="fas fa-globe"></i><a href="${data.portfolio}" target="_blank">Portfolio</a></div>` : ''}
                        </div>
                    </div>
                    <div class="cv-section">
                        ${data.summary ? `
                            <h2><i class="fas fa-quote-left" style="margin-right:12px;opacity:0.7;"></i>Professional Summary</h2>
                            <p style="font-size:16px;line-height:1.8;color:var(--gray-700);">${data.summary.replace(/\n/g, '<br>')}</p>
                        ` : ''}
                        
                        ${data.experience.length ? `
                            <h2><i class="fas fa-briefcase" style="margin-right:12px;opacity:0.7;"></i>Experience</h2>
                            ${data.experience.map(exp => `
                                <div>
                                    <h3>${exp.jobTitle} <span style="color:var(--gray-500);font-weight:500;">@ ${exp.company}</span></h3>
                                    <div class="meta">${exp.jobDates} ${exp.location ? `• ${exp.location}` : ''}</div>
                                    ${exp.jobDesc ? `<div class="desc">${exp.jobDesc.replace(/\n/g, '<br>')}</div>` : ''}
                                </div>
                            `).join('')}
                        ` : ''}
                        
                        ${data.education.length ? `
                            <h2><i class="fas fa-graduation-cap" style="margin-right:12px;opacity:0.7;"></i>Education</h2>
                            ${data.education.map(edu => `
                                <div>
                                    <h3>${edu.degree} <span style="color:var(--gray-500);font-weight:500;">${edu.school}</span></h3>
                                    <div class="meta">${edu.eduDates} ${edu.eduGpa ? `• ${edu.eduGpa}` : ''}</div>
                                </div>
                            `).join('')}
                        ` : ''}
                        
                        ${data.skills.length ? `
                            <h2><i class="fas fa-star" style="margin-right:12px;opacity:0.7;"></i>Skills</h2>
                            <div class="skills-grid">
                                ${data.skills.map(skill => `<div class="skill-tag">${skill}</div>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            }

            downloadPDF() {
                const data = this.getFormData();
                if (!data.fullName) {
                    alert('Please enter your full name first!');
                    return;
                }

                const btn = document.getElementById('downloadPDF');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating PDF...';
                btn.disabled = true;

                // Clone preview for PDF with optimized styles
                const pdfPreview = document.getElementById('cvPreview').cloneNode(true);
                pdfPreview.style.cssText = `
                    height: auto !important;
                    background: white !important;
                    box-shadow: none !important;
                    padding: 40px !important;
                    font-family: 'Inter', sans-serif !important;
                    max-width: 210mm !important;
                    margin: 0 !important;
                `;
                pdfPreview.className = 'cv-preview template-' + data.template;
                document.body.appendChild(pdfPreview);

                const opt = {
                    margin: [0.5, 0.5, 0.5, 0.5],
                    filename: `${data.fullName.replace(/[^a-zA-Z0-9]/g, '_')}_Resume.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { 
                        scale: 2, 
                        useCORS: true, 
                        letterRendering: true,
                        width: 794,
                        height: 1123
                    },
                    jsPDF: { 
                        unit: 'in', 
                        format: 'a4', 
                        orientation: 'portrait',
                        compress: true 
                    }
                };

                html2pdf().set(opt).from(pdfPreview).save().finally(() => {
                    document.body.removeChild(pdfPreview);
                    btn.innerHTML = '<i class="fas fa-download"></i> Download PDF';
                    btn.disabled = false;
                });
            }

            copyHTML() {
                const data = this.getFormData();
                navigator.clipboard.writeText(`
<!DOCTYPE html>
<html><head><title>${data.fullName} - Resume</title>
<style>
body{font-family:'Inter',sans-serif;max-width:800px;margin:40px auto;padding:20px;line-height:1.7;color:#333;background:white;}
.cv-preview{padding:40px;}
h1{font-size:2.5rem;font-weight:800;margin-bottom:10px;}
h2{font-size:1.5rem;border-bottom:3px solid #667eea;padding-bottom:12px;margin:40px 0 25px;}
h3{font-size:1.2rem;margin:25px 0 10px;color:#1a1a1a;}
.meta{color:#667eea;font-weight:600;}
.skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-top:20px;}
.skill-tag{background:rgba(102,126,234,0.1);color:#667eea;padding:12px 20px;border-radius:25px;text-align:center;font-weight:600;}
</style>
</head><body>${document.getElementById('cvPreview').innerHTML}</body></html>
                `).then(() => {
                    const btn = document.getElementById('copyHTML');
                    const original = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                    btn.className = 'btn btn-primary';
                    setTimeout(() => {
                        btn.innerHTML = original;
                        btn.className = 'btn btn-secondary';
                    }, 2500);
                });
            }

            loadFromStorage() {
                try {
                    const data = JSON.parse(localStorage.getItem('modernCVData') || '{}');
                    if (data.skills) this.skills = data.skills;
                    Object.entries(data).forEach(([key, value]) => {
                        const el = document.getElementById(key);
                        if (el) el.value = value;
                    });
                    this.renderSkills();
                    this.updatePreview();
                } catch (e) {}
            }

            saveToStorage() {
                const data = this.getFormData();
                localStorage.setItem('modernCVData', JSON.stringify(data));
            }
        }

        // Auto-save on input
        document.addEventListener('input', () => {
            setTimeout(() => {
                if (window.cvMaker) {
                    window.cvMaker.saveToStorage();
                    window.cvMaker.updatePreview();
                }
            }, 500);
        });

        document.addEventListener('DOMContentLoaded', () => {
            window.cvMaker = new ModernCVMaker();
        });
    </script>
</body>
</html>
